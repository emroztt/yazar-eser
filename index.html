<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>YKS Edebiyat Test</title>
  <style>
    :root{
      --bg:#08070b;
      --glass:rgba(255,255,255,.105);
      --glass-2:rgba(255,255,255,.15);
      --stroke:rgba(255,255,255,.18);
      --text:#fff8ee;
      --muted:rgba(255,248,238,.72);
      --orange:#ff7a18;
      --red:#ff2f46;
      --gold:#ffd166;
      --dark:#151823;
      --green:#18c86f;
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html{min-height:100%;background:var(--bg)}
    body{
      margin:0;min-height:100vh;color:var(--text);
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 18% 12%, rgba(255,122,24,.45), transparent 30%),
        radial-gradient(circle at 88% 10%, rgba(255,47,70,.30), transparent 28%),
        radial-gradient(circle at 60% 88%, rgba(255,209,102,.18), transparent 35%),
        linear-gradient(145deg,#07070c 0%,#190b10 42%,#0c101b 100%);
      overflow-x:hidden;
    }
    body:before{
      content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.42;
      background-image:
        linear-gradient(rgba(255,255,255,.045) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.045) 1px,transparent 1px);
      background-size:42px 42px;
      mask-image:radial-gradient(circle at center,black 0%,transparent 82%);
    }
    body:after{
      content:"";position:fixed;inset:-40%;z-index:0;pointer-events:none;opacity:.33;
      background:conic-gradient(from 120deg,transparent,rgba(255,122,24,.14),transparent,rgba(255,47,70,.12),transparent);
      animation:spin 20s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    .app{position:relative;z-index:2;width:100%;max-width:590px;margin:0 auto;padding:18px 15px 38px}
    .screen{display:none;animation:rise .24s ease both}
    .screen.active{display:block}
    @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

    .hero{text-align:center;padding:16px 4px 22px}
    .pill{
      display:inline-flex;gap:8px;align-items:center;padding:8px 14px;border-radius:999px;
      background:rgba(255,255,255,.105);border:1px solid var(--stroke);
      color:var(--gold);font-weight:900;font-size:12px;letter-spacing:.7px;text-transform:uppercase;
      box-shadow:0 12px 34px rgba(0,0,0,.28);
    }
    h1{font-size:42px;line-height:.98;letter-spacing:-1.4px;margin:14px 0 10px;font-weight:1000}
    .hero p{margin:0 auto;color:var(--muted);font-size:15px;line-height:1.5;max-width:420px}

    .menu{display:grid;gap:14px}
    .menu-card{
      position:relative;width:100%;min-height:118px;border:1px solid var(--stroke);border-radius:28px;
      padding:19px 18px;text-align:left;color:var(--text);cursor:pointer;overflow:hidden;
      background:linear-gradient(135deg,rgba(255,255,255,.14),rgba(255,255,255,.06));
      box-shadow:0 24px 60px rgba(0,0,0,.40), inset 0 1px 0 rgba(255,255,255,.13);
      backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
      transition:transform .18s ease, border-color .18s ease, background .18s ease;
      touch-action:manipulation;
    }
    .menu-card:before{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(120deg,rgba(255,255,255,.14),transparent 34%,transparent 68%,rgba(255,255,255,.06));opacity:.9}
    .menu-card:after{
      content:"";position:absolute;right:-45px;top:-48px;width:140px;height:140px;border-radius:50%;pointer-events:none;
      background:radial-gradient(circle,rgba(255,209,102,.95),rgba(255,122,24,.68) 45%,rgba(255,47,70,.38) 70%,transparent 72%);
      filter:blur(.3px);
    }
    .menu-card:hover{transform:translateY(-3px);border-color:rgba(255,209,102,.55);background:linear-gradient(135deg,rgba(255,255,255,.18),rgba(255,255,255,.075))}
    .menu-card:active{transform:scale(.985)}
    .menu-top{position:relative;z-index:2;display:flex;gap:14px;align-items:center;margin-bottom:12px;pointer-events:none}
    .icon{
      width:58px;height:58px;border-radius:21px;display:grid;place-items:center;
      font-size:30px;line-height:1;position:relative;isolation:isolate;flex:0 0 58px;
      background:
        radial-gradient(circle at 30% 20%,rgba(255,255,255,.95),rgba(255,255,255,.18) 24%,transparent 26%),
        linear-gradient(145deg,#ffcf66 0%,#ff7a18 42%,#ff2f46 100%);
      border:1px solid rgba(255,255,255,.32);
      box-shadow:
        0 0 0 1px rgba(255,209,102,.22),
        0 0 22px rgba(255,209,102,.78),
        0 0 46px rgba(255,83,35,.52),
        0 18px 34px rgba(255,47,70,.30),
        inset 0 2px 0 rgba(255,255,255,.55),
        inset 0 -14px 24px rgba(80,8,8,.28);
      text-shadow:
        0 2px 0 rgba(0,0,0,.16),
        0 0 12px rgba(255,255,255,.95),
        0 0 24px rgba(255,209,102,.80);
      transform-style:preserve-3d;
      animation:iconFloat 2.4s ease-in-out infinite;
    }
    .icon::before{
      content:"";position:absolute;inset:-8px;border-radius:26px;z-index:-2;pointer-events:none;
      background:radial-gradient(circle,rgba(255,209,102,.60),rgba(255,61,0,.32) 48%,transparent 72%);
      filter:blur(11px);
      animation:haloPulse 2.4s ease-in-out infinite;
    }
    .icon::after{
      content:"✦";position:absolute;right:-5px;top:-8px;z-index:2;pointer-events:none;
      color:#fff8d8;font-size:15px;text-shadow:0 0 10px rgba(255,255,255,.95),0 0 18px rgba(255,209,102,.9);
      animation:sparkle 1.7s ease-in-out infinite;
    }
    @keyframes iconFloat{0%,100%{transform:translateY(0) scale(1) rotate(-1deg);filter:saturate(1.05) brightness(1)}50%{transform:translateY(-3px) scale(1.055) rotate(1deg);filter:saturate(1.28) brightness(1.14)}}
    @keyframes haloPulse{0%,100%{opacity:.72;transform:scale(.94)}50%{opacity:1;transform:scale(1.08)}}
    @keyframes sparkle{0%,100%{opacity:.55;transform:scale(.82) rotate(0deg)}50%{opacity:1;transform:scale(1.24) rotate(18deg)}}
    .menu-card:nth-child(1) .icon{background:radial-gradient(circle at 30% 20%,rgba(255,255,255,.95),rgba(255,255,255,.18) 24%,transparent 26%),linear-gradient(145deg,#ffe066 0%,#ff9f1c 42%,#ff3d00 100%)}
    .menu-card:nth-child(2) .icon{background:radial-gradient(circle at 30% 20%,rgba(255,255,255,.95),rgba(255,255,255,.18) 24%,transparent 26%),linear-gradient(145deg,#ffb703 0%,#fb5607 50%,#d00000 100%)}
    .menu-card:nth-child(3) .icon{background:radial-gradient(circle at 30% 20%,rgba(255,255,255,.95),rgba(255,255,255,.18) 24%,transparent 26%),linear-gradient(145deg,#ffd166 0%,#ff4d00 45%,#ff006e 100%)}
    .menu-card:nth-child(4) .icon{background:radial-gradient(circle at 30% 20%,rgba(255,255,255,.95),rgba(255,255,255,.18) 24%,transparent 26%),linear-gradient(145deg,#ffbe0b 0%,#ff5400 45%,#9d0208 100%)}
    .menu-card:nth-child(5) .icon{background:radial-gradient(circle at 30% 20%,rgba(255,255,255,.95),rgba(255,255,255,.18) 24%,transparent 26%),linear-gradient(145deg,#ffd166 0%,#ff7a18 45%,#6a040f 100%)}
    .menu-card h2{margin:0;font-size:22px;font-weight:1000;letter-spacing:-.45px}
    .menu-card p{position:relative;z-index:2;margin:0;padding-right:42px;color:var(--muted);font-size:14px;line-height:1.45;pointer-events:none}

    .panel{
      border:1px solid var(--stroke);border-radius:30px;padding:18px;background:linear-gradient(135deg,rgba(255,255,255,.14),rgba(255,255,255,.06));
      box-shadow:0 26px 70px rgba(0,0,0,.42), inset 0 1px 0 rgba(255,255,255,.12);
      backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    }
    .top-title{text-align:center;margin:18px 0 15px;font-size:31px;letter-spacing:-.8px;font-weight:1000}
    label{display:block;margin:13px 0 8px 2px;color:rgba(255,248,238,.78);font-size:13px;font-weight:900}
    select{
      width:100%;border:none;border-radius:19px;padding:15px 14px;outline:none;font-size:16px;font-weight:900;color:#251008;background:#fff6e8;
      box-shadow:0 16px 34px rgba(0,0,0,.24), inset 0 -1px 0 rgba(0,0,0,.08);
    }
    .main-btn,.ghost-btn{
      width:100%;border-radius:19px;padding:15px 16px;font-size:16px;font-weight:1000;cursor:pointer;touch-action:manipulation;
      transition:transform .14s ease,filter .14s ease;border:none;
    }
    .main-btn{margin-top:17px;color:#210b04;background:linear-gradient(135deg,var(--gold),var(--orange),var(--red));box-shadow:0 18px 38px rgba(255,83,35,.35)}
    .ghost-btn{margin-top:10px;color:var(--text);background:rgba(255,255,255,.10);border:1px solid var(--stroke)}
    .main-btn:active,.ghost-btn:active{transform:scale(.985)}

    .progress{display:inline-flex;align-items:center;gap:8px;margin:8px 0 14px;padding:8px 13px;border-radius:999px;background:rgba(255,255,255,.10);border:1px solid var(--stroke);color:var(--gold);font-size:13px;font-weight:1000}
    .question-card{background:linear-gradient(180deg,#fffaf2,#fff0dd);color:#160907;border-radius:30px;padding:20px;box-shadow:0 28px 70px rgba(0,0,0,.50)}
    .question{font-size:21px;line-height:1.35;font-weight:1000;letter-spacing:-.35px;margin-bottom:17px}
    .answers{display:flex;flex-direction:column;gap:10px}
    .answer{width:100%;border:none;border-radius:18px;padding:15px;text-align:left;font-size:16px;font-weight:950;cursor:pointer;color:white;background:linear-gradient(135deg,#262936,#11131b);box-shadow:0 12px 22px rgba(0,0,0,.18);touch-action:manipulation;transition:transform .12s ease,filter .12s ease}
    .answer:active{transform:scale(.99)}
    .answer.correct{background:linear-gradient(135deg,#00a884,#2be477)!important;color:white!important}
    .answer.wrong{background:linear-gradient(135deg,#ff0844,#ff3d00)!important;color:white!important}
    .answer:disabled{cursor:not-allowed}

    .result-number{text-align:center;font-size:48px;font-weight:1000;margin:8px 0 5px;color:var(--gold)}
    .result-text{text-align:center;color:rgba(255,248,238,.80);margin-bottom:16px;line-height:1.45}
    .wrong-item{background:rgba(255,255,255,.11);border:1px solid var(--stroke);border-radius:18px;padding:14px;margin-bottom:10px;color:rgba(255,248,238,.90);font-size:14px;line-height:1.45}
    .wrong-item b{color:var(--gold)}
    .empty{text-align:center;color:rgba(255,248,238,.72);padding:28px 10px}.mini-note{margin-top:18px;text-align:center;font-size:12px;color:rgba(255,248,238,.50)}
    @media(max-width:430px){.app{padding:14px 13px 30px}h1{font-size:34px}.question{font-size:19px}.menu-card{border-radius:24px}}
  </style>
</head>
<body>
<div class="app">
  <div id="homeScreen" class="screen active">
    <div class="hero">
      <div class="pill">⚡ YKS Edebiyat</div>
      <h1>Edebiyat Test</h1>
    </div>
    <div class="menu">
      <button type="button" class="menu-card" data-open="frequent"><div class="menu-top"><div class="icon">⭐</div><h2>Sık Sorulanlar</h2></div><p>ÖSYM tarzı ilkler, temel eserler, akımlar ve roman kahramanları.</p></button>
      <button type="button" class="menu-card" data-open="authorWork"><div class="menu-top"><div class="icon">✍️</div><h2>Yazar - Eser</h2></div><p>Dönem seç; yazardan eseri veya eserden yazarı bul.</p></button>
      <button type="button" class="menu-card" data-open="movements"><div class="menu-top"><div class="icon">🔥</div><h2>Edebi Akımlar</h2></div><p>Özellik, bilgi ve az sayıda temsilci üzerinden akımı bul.</p></button>
      <button type="button" class="menu-card" data-open="characters"><div class="menu-top"><div class="icon">🎭</div><h2>Roman Kahramanları</h2></div><p>Kahramanlar verilsin, hangi eserin olduğunu seç.</p></button>
      <button type="button" class="menu-card" id="btnWrongs"><div class="menu-top"><div class="icon">📌</div><h2>Yanlışlarım</h2></div><p>Yanlış yaptığın soruları tekrar gör.</p></button>
    </div>
  </div>

  <div id="settingsScreen" class="screen"><h1 class="top-title" id="settingsTitle">Test Ayarları</h1><div class="panel">
    <div id="periodBox"><label>Dönem seç</label><select id="periodSelect"></select></div>
    <div id="typeBox"><label>Soru tipi seç</label><select id="typeSelect"></select></div>
    <label>Kaç soru olsun?</label><select id="countSelect"></select>
    <button type="button" class="main-btn" id="startBtn">Teste Başla</button><button type="button" class="ghost-btn" data-home>Ana Menü</button>
  </div></div>

  <div id="testScreen" class="screen"><div class="progress" id="progressText"></div><div class="question-card"><div class="question" id="questionText"></div><div class="answers" id="answers"></div></div><button type="button" class="ghost-btn" data-home>Testi Bitir</button></div>
  <div id="resultScreen" class="screen"><h1 class="top-title">Sonuç</h1><div class="panel"><div class="result-number" id="resultNumber"></div><div class="result-text" id="resultText"></div><button type="button" class="main-btn" id="repeatBtn">Aynı Testten Tekrar Çöz</button><button type="button" class="ghost-btn" data-home>Ana Menü</button></div></div>
  <div id="wrongScreen" class="screen"><h1 class="top-title">Yanlışlarım</h1><div id="wrongList"></div><button type="button" class="main-btn" id="clearWrongBtn">Yanlışları Temizle</button><button type="button" class="ghost-btn" data-home>Ana Menü</button></div>
</div>

var movements=[['Klasisizm',['Akıl ve sağduyu','Kuralcılık','Eski Yunan ve Latin etkisi'],['Moliere']],['Romantizm',['Duygu ve hayal','Hürriyet','Tarihî konular','Sanatçı kişiliğini gizlemez'],['Victor Hugo','Namık Kemal']],['Realizm',['Gözlem','Nesnellik','Çevre tasviri','Neden-sonuç'],['Balzac','Flaubert']],['Natüralizm',['Soyaçekim','Determinizm','Toplum laboratuvarı','Sokak dili'],['Emile Zola']],['Parnasizm',['Biçim kusursuzluğu','Sanat sanat içindir','Kuyumcu titizliği'],['Tevfik Fikret','Cenap Şahabettin']],['Sembolizm',['Musiki','Kapalılık','Sezdirme','Alacakaranlık'],['Ahmet Haşim','Verlaine']],['Fütürizm',['Hız','Makineleşme','Gelecekçilik','Dinamizm'],['Marinetti','Nazım Hikmet']],['Dadaizm',['Kuralsızlık','Anlamsızlık','Geleneksel sanatı reddetme'],['Tristan Tzara']],['Sürrealizm',['Bilinçaltı','Rüya','Freud','Otomatik yazı'],['Andre Breton']],['Egzistansiyalizm',['Varoluş','Bunaltı','Yabancılaşma','Sorumluluk'],['Sartre','Camus']]];
var firsts=[["Türk dilinin ilk sözlüğü hangisidir?","Divanü Lügati't-Türk"],['İlk siyasetname örneği hangisidir?','Kutadgu Bilig'],['İlk yazılı edebî metin hangisidir?','Göktürk Yazıtları'],['İlk Türkçe sözlük hangisidir?','Kamus-ı Türkî'],['Türkçenin ilk dil bilgisi kitabı hangisidir?','Sarf-ı Türkî'],['İlk tezkire örneği hangisidir?','Mecalisü’n-Nefais'],['Anadolu sahasında yazılan ilk tezkire hangisidir?','Heşt Behişt'],['İlk bibliyografya örneği hangisidir?',"Keşfü'z-Zunun"],['İlk atasözleri derlemesi hangisidir?','Durub-ı Emsal-i Osmaniye'],['İlk hatıra kitabı hangisidir?','Babürnâme'],['En önemli gezi yazısı örneği hangisidir?','Seyahatname'],['İlk yerli roman hangisidir?','Taaşşuk-ı Talat ve Fitnat'],['İlk edebî roman hangisidir?','İntibah'],['İlk realist roman denemesi hangisidir?','Araba Sevdası'],['İlk köy romanı denemesi hangisidir?','Karabibik'],['İlk psikolojik roman hangisidir?','Eylül'],['İlk tiyatro eseri hangisidir?','Şair Evlenmesi']];
var currentCategory='',currentType='',currentPeriod='Tüm Dönemler',currentCount=10,questions=[],qIndex=0,correct=0,wrong=0,lastSettings=null;
function byId(id){return document.getElementById(id)}
function showScreen(id){var s=document.getElementsByClassName('screen');for(var i=0;i<s.length;i++)s[i].classList.remove('active');byId(id).classList.add('active');window.scrollTo(0,0)}
function goHome(){showScreen('homeScreen')}
function addOption(sel,val,text){var o=document.createElement('option');o.value=val;o.text=text;sel.appendChild(o)}
function openSettings(cat){currentCategory=cat;var title=byId('settingsTitle'),periodBox=byId('periodBox'),typeBox=byId('typeBox'),pSel=byId('periodSelect'),tSel=byId('typeSelect'),cSel=byId('countSelect');pSel.innerHTML='';tSel.innerHTML='';cSel.innerHTML='';for(var i=10;i<=100;i+=10)addOption(cSel,String(i),i+' soru');if(cat==='authorWork'){title.innerText='Yazar - Eser';periodBox.style.display='block';typeBox.style.display='block';var ps=['Tüm Dönemler','İslamiyet İlk Dönem','Halk Edebiyatı','Divan / Geçiş','Tanzimat','Servetifünun','Fecriati','Milli Edebiyat','Cumhuriyet'];for(var p=0;p<ps.length;p++)addOption(pSel,ps[p],ps[p]);addOption(tSel,'authorToWork','Yazar - Eser');addOption(tSel,'workToAuthor','Eser - Yazar')}else{periodBox.style.display='none';typeBox.style.display='none';title.innerText=cat==='frequent'?'Sık Sorulanlar':cat==='movements'?'Edebi Akımlar':'Roman Kahramanları'}showScreen('settingsScreen')}
function startTest(){currentCount=Number(byId('countSelect').value);if(currentCategory==='authorWork'){currentPeriod=byId('periodSelect').value;currentType=byId('typeSelect').value}else{currentPeriod='Tüm Dönemler';currentType=currentCategory}lastSettings=[currentCategory,currentType,currentPeriod,currentCount];questions=shuffle(buildQuestions());if(questions.length>currentCount)questions=questions.slice(0,currentCount);qIndex=0;correct=0;wrong=0;showScreen('testScreen');showQuestion()}
function repeatSameTest(){if(!lastSettings){goHome();return}currentCategory=lastSettings[0];currentType=lastSettings[1];currentPeriod=lastSettings[2];currentCount=lastSettings[3];questions=shuffle(buildQuestions());if(questions.length>currentCount)questions=questions.slice(0,currentCount);qIndex=0;correct=0;wrong=0;showScreen('testScreen');showQuestion()}
function buildQuestions(){if(currentCategory==='authorWork')return currentType==='authorToWork'?buildAuthorToWork():buildWorkToAuthor();if(currentCategory==='characters')return buildCharacterQuestions(characters);if(currentCategory==='movements')return buildMovementQuestions();if(currentCategory==='frequent')return shuffle(buildAuthorToWork().concat(buildWorkToAuthor(),buildCharacterQuestions(characters),buildMovementQuestions(),buildFirstQuestions()));return[]}
function getAuthorData(){if(currentPeriod==='Tüm Dönemler')return authorWorks.slice();var l=[];for(var i=0;i<authorWorks.length;i++)if(authorWorks[i][0]===currentPeriod)l.push(authorWorks[i]);return l}
function buildAuthorToWork(){var data=getAuthorData(),all=[],res=[];for(var i=0;i<data.length;i++)for(var j=0;j<data[i][2].length;j++)all.push(data[i][2][j]);for(var a=0;a<data.length;a++){var author=data[a][1],works=data[a][2];for(var w=0;w<works.length;w++){var ans=works[w],wrongPool=[];for(var x=0;x<all.length;x++)if(works.indexOf(all[x])===-1)wrongPool.push(all[x]);res.push({question:author+' adlı sanatçının eseri hangisidir?',answer:ans,options:shuffle([ans].concat(getRandomWrong(wrongPool,ans,4)))})}}return res}
function buildWorkToAuthor(){var data=getAuthorData(),authors=[],owner={},res=[];for(var i=0;i<data.length;i++){authors.push(data[i][1]);for(var j=0;j<data[i][2].length;j++){var work=data[i][2][j];if(!owner[work])owner[work]=[];if(owner[work].indexOf(data[i][1])===-1)owner[work].push(data[i][1])}}for(var a=0;a<data.length;a++){var author=data[a][1];for(var w=0;w<data[a][2].length;w++){var workName=data[a][2][w];if(owner[workName]&&owner[workName].length>1)continue;res.push({question:'"'+workName+'" adlı eser kime aittir?',answer:author,options:shuffle([author].concat(getRandomWrong(authors,author,4)))})}}return res}
function buildCharacterQuestions(src){var works=[],res=[];for(var i=0;i<src.length;i++)works.push(src[i][0]);for(var c=0;c<src.length;c++)res.push({question:src[c][1].join(', ')+' hangi eserin kahramanlarıdır?',answer:src[c][0],options:shuffle([src[c][0]].concat(getRandomWrong(works,src[c][0],4)))});return res}
function buildMovementQuestions(){var names=[],base=[],authors=[];for(var i=0;i<movements.length;i++)names.push(movements[i][0]);for(var m=0;m<movements.length;m++){var name=movements[m][0],clues=movements[m][1],auth=movements[m][2];for(var c=0;c<clues.length;c++)base.push({question:shuffle(clues).slice(0,3).join(', ')+' özellikleri hangi edebi akıma aittir?',answer:name,options:shuffle([name].concat(getRandomWrong(names,name,4)))});for(var a=0;a<auth.length;a++)authors.push({question:auth[a]+' hangi edebi akımla ilişkilendirilir?',answer:name,options:shuffle([name].concat(getRandomWrong(names,name,4)))})}var limit=currentCount<=10?1:currentCount>=50?6:currentCount>=30?3:2;return shuffle(base).slice(0,Math.max(0,currentCount-limit)).concat(shuffle(authors).slice(0,limit))}
function buildFirstQuestions(){var answers=[],res=[];for(var i=0;i<firsts.length;i++)answers.push(firsts[i][1]);for(var f=0;f<firsts.length;f++)res.push({question:firsts[f][0],answer:firsts[f][1],options:shuffle([firsts[f][1]].concat(getRandomWrong(answers,firsts[f][1],4)))});return res}
function showQuestion(){if(qIndex>=questions.length){finishTest();return}var q=questions[qIndex];byId('progressText').innerText=(qIndex+1)+' / '+questions.length;byId('questionText').innerText=q.question;var ans=byId('answers');ans.innerHTML='';for(var i=0;i<q.options.length;i++){var b=document.createElement('button');b.type='button';b.className='answer';b.innerText=q.options[i];b.addEventListener('click',makeHandler(b,q.options[i],q));ans.appendChild(b)}}
function makeHandler(btn,selected,q){return function(){answerQuestion(btn,selected,q)}}
function answerQuestion(btn,selected,q){var bs=document.getElementsByClassName('answer');for(var i=0;i<bs.length;i++)bs[i].disabled=true;if(selected===q.answer){correct++;btn.classList.add('correct')}else{wrong++;btn.classList.add('wrong');for(var b=0;b<bs.length;b++)if(bs[b].innerText===q.answer)bs[b].classList.add('correct');saveWrong(q.question,selected,q.answer)}setTimeout(function(){qIndex++;showQuestion()},850)}
function finishTest(){var total=correct+wrong,p=total===0?0:Math.round(correct/total*100);byId('resultNumber').innerText=correct+'/'+total;byId('resultText').innerHTML='Doğru: <b>'+correct+'</b> &nbsp; Yanlış: <b>'+wrong+'</b><br>Başarı: <b>%'+p+'</b>';showScreen('resultScreen')}
function showWrongs(){var wrongs=JSON.parse(localStorage.getItem('edebiyatWrongs')||'[]'),list=byId('wrongList');list.innerHTML='';if(wrongs.length===0)list.innerHTML='<div class="empty">Henüz yanlış yok kanka.</div>';else for(var i=0;i<wrongs.length;i++){var d=document.createElement('div');d.className='wrong-item';d.innerHTML='<b>Soru:</b> '+escapeHtml(wrongs[i].question)+'<br><b>Senin cevabın:</b> '+escapeHtml(wrongs[i].selected)+'<br><b>Doğru cevap:</b> '+escapeHtml(wrongs[i].answer)+'<br><small>'+escapeHtml(wrongs[i].date)+'</small>';list.appendChild(d)}showScreen('wrongScreen')}
function saveWrong(question,selected,answer){var w=JSON.parse(localStorage.getItem('edebiyatWrongs')||'[]');w.unshift({question:question,selected:selected,answer:answer,date:new Date().toLocaleString('tr-TR')});if(w.length>250)w=w.slice(0,250);localStorage.setItem('edebiyatWrongs',JSON.stringify(w))}
function clearWrongs(){localStorage.removeItem('edebiyatWrongs');showWrongs()}
function getRandomWrong(arr,correct,count){var u=[],w=[];for(var i=0;i<arr.length;i++)if(arr[i]!==correct&&u.indexOf(arr[i])===-1)u.push(arr[i]);u=shuffle(u);for(var j=0;j<u.length&&w.length<count;j++)w.push(u[j]);return w}
function shuffle(array){var arr=array.slice();for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),tmp=arr[i];arr[i]=arr[j];arr[j]=tmp}return arr}
function escapeHtml(text){return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}
document.addEventListener('DOMContentLoaded',function(){var opens=document.querySelectorAll('[data-open]');for(var i=0;i<opens.length;i++)opens[i].addEventListener('click',function(){openSettings(this.getAttribute('data-open'))});var homes=document.querySelectorAll('[data-home]');for(var h=0;h<homes.length;h++)homes[h].addEventListener('click',goHome);byId('btnWrongs').addEventListener('click',showWrongs);byId('startBtn').addEventListener('click',startTest);byId('repeatBtn').addEventListener('click',repeatSameTest);byId('clearWrongBtn').addEventListener('click',clearWrongs)});
})();
</script>
</body>
</html>
