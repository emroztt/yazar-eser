<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>YKS Edebiyat Test</title>
<style>
    :root{
      --bg:#08070b;
      --glass:rgba(255,255,255,.105);
      --glass-2:rgba(255,255,255,.15);
      --stroke:rgba(255,255,255,.18);
      --text:#fff8ee;
      --muted:rgba(255,248,238,.72);
      --primary:#ff7a18;
      --secondary:#ff2f46;
      --accent:#ffd166;
      --orange:var(--primary);
      --red:var(--secondary);
      --gold:var(--accent);
      --dark:#151823;
      --green:#18c86f;
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html{min-height:100%;background:var(--bg)}
    body{
      margin:0;min-height:100vh;color:var(--text);
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 18% 12%, var(--primary), transparent 30%),
        radial-gradient(circle at 88% 10%, var(--secondary), transparent 28%),
        radial-gradient(circle at 60% 88%, var(--accent), transparent 35%),
        linear-gradient(145deg,var(--bg) 0%,#190b10 42%,#0c101b 100%);
      overflow-x:hidden;
    }
    body:before{
      content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.42;
      background-image:
        linear-gradient(rgba(255,255,255,.045) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.045) 1px,transparent 1px);
      background-size:42px 42px;
      mask-image:radial-gradient(circle at center,black 0%,transparent 82%);
    }
    body:after{
      content:"";position:fixed;inset:-40%;z-index:0;pointer-events:none;opacity:.33;
      background:conic-gradient(from 120deg,transparent,rgba(255,122,24,.14),transparent,rgba(255,47,70,.12),transparent);
      animation:spin 20s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    .app{position:relative;z-index:2;width:100%;max-width:590px;margin:0 auto;padding:18px 15px 38px}
    .screen{display:none;animation:rise .24s ease both}
    .screen.active{display:block}
    @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

    .yks-counter{
      display:inline-flex;align-items:center;gap:7px;margin-top:12px;padding:7px 12px;border-radius:999px;
      background:linear-gradient(135deg,rgba(255,209,102,.18),rgba(255,47,70,.12));
      border:1px solid rgba(255,209,102,.28);color:#fff8ee;font-size:12px;font-weight:900;
      box-shadow:0 10px 28px rgba(0,0,0,.22),0 0 22px rgba(255,122,24,.16);
      backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)
    }
    .yks-counter .dot{width:7px;height:7px;border-radius:50%;background:#ffd166;box-shadow:0 0 12px rgba(255,209,102,.9)}
    .yks-counter b{color:#ffd166}


    .hero{text-align:center;padding:16px 4px 22px}
    .pill{
      display:inline-flex;gap:8px;align-items:center;padding:8px 14px;border-radius:999px;
      background:rgba(255,255,255,.105);border:1px solid var(--stroke);
      color:var(--gold);font-weight:900;font-size:12px;letter-spacing:.7px;text-transform:uppercase;
      box-shadow:0 12px 34px rgba(0,0,0,.28);
    }
    h1{font-size:42px;line-height:.98;letter-spacing:-1.4px;margin:14px 0 10px;font-weight:1000}
    .hero p{margin:0 auto;color:var(--muted);font-size:15px;line-height:1.5;max-width:420px}

    .menu{display:grid;gap:14px}
    .menu-card{
      position:relative;width:100%;min-height:118px;border:1px solid var(--stroke);border-radius:28px;
      padding:19px 18px;text-align:left;color:var(--text);cursor:pointer;overflow:hidden;
      background:linear-gradient(135deg,rgba(255,255,255,.14),rgba(255,255,255,.06));
      box-shadow:0 24px 60px rgba(0,0,0,.40), inset 0 1px 0 rgba(255,255,255,.13);
      backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
      transition:transform .18s ease, border-color .18s ease, background .18s ease;
      touch-action:manipulation;
    }
    .menu-card:before{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(120deg,rgba(255,255,255,.14),transparent 34%,transparent 68%,rgba(255,255,255,.06));opacity:.9}
    .menu-card:after{
      content:"";position:absolute;right:-45px;top:-48px;width:140px;height:140px;border-radius:50%;pointer-events:none;
      background:radial-gradient(circle,rgba(255,209,102,.95),rgba(255,122,24,.68) 45%,rgba(255,47,70,.38) 70%,transparent 72%);
      filter:blur(.3px);
    }
    .menu-card:hover{transform:translateY(-3px);border-color:rgba(255,209,102,.55);background:linear-gradient(135deg,rgba(255,255,255,.18),rgba(255,255,255,.075))}
    .menu-card:active{transform:scale(.985)}
    .menu-top{position:relative;z-index:2;display:flex;gap:14px;align-items:center;margin-bottom:12px;pointer-events:none}
    .icon{
      width:58px;height:58px;border-radius:21px;display:grid;place-items:center;
      font-size:30px;line-height:1;position:relative;isolation:isolate;flex:0 0 58px;
      background:
        radial-gradient(circle at 30% 20%,rgba(255,255,255,.95),rgba(255,255,255,.18) 24%,transparent 26%),
        linear-gradient(145deg,#ffcf66 0%,#ff7a18 42%,#ff2f46 100%);
      border:1px solid rgba(255,255,255,.32);
      box-shadow:
        0 0 0 1px rgba(255,209,102,.22),
        0 0 22px rgba(255,209,102,.78),
        0 0 46px rgba(255,83,35,.52),
        0 18px 34px rgba(255,47,70,.30),
        inset 0 2px 0 rgba(255,255,255,.55),
        inset 0 -14px 24px rgba(80,8,8,.28);
      text-shadow:
        0 2px 0 rgba(0,0,0,.16),
        0 0 12px rgba(255,255,255,.95),
        0 0 24px rgba(255,209,102,.80);
      transform-style:preserve-3d;
      animation:iconFloat 2.4s ease-in-out infinite;
    }
    .icon::before{
      content:"";position:absolute;inset:-8px;border-radius:26px;z-index:-2;pointer-events:none;
      background:radial-gradient(circle,rgba(255,209,102,.60),rgba(255,61,0,.32) 48%,transparent 72%);
      filter:blur(11px);
      animation:haloPulse 2.4s ease-in-out infinite;
    }
    .icon::after{
      content:"✦";position:absolute;right:-5px;top:-8px;z-index:2;pointer-events:none;
      color:#fff8d8;font-size:15px;text-shadow:0 0 10px rgba(255,255,255,.95),0 0 18px rgba(255,209,102,.9);
      animation:sparkle 1.7s ease-in-out infinite;
    }
    @keyframes iconFloat{0%,100%{transform:translateY(0) scale(1) rotate(-1deg);filter:saturate(1.05) brightness(1)}50%{transform:translateY(-3px) scale(1.055) rotate(1deg);filter:saturate(1.28) brightness(1.14)}}
    @keyframes haloPulse{0%,100%{opacity:.72;transform:scale(.94)}50%{opacity:1;transform:scale(1.08)}}
    @keyframes sparkle{0%,100%{opacity:.55;transform:scale(.82) rotate(0deg)}50%{opacity:1;transform:scale(1.24) rotate(18deg)}}
    .menu-card:nth-child(1) .icon{background:radial-gradient(circle at 30% 20%,rgba(255,255,255,.95),rgba(255,255,255,.18) 24%,transparent 26%),linear-gradient(145deg,#ffe066 0%,#ff9f1c 42%,#ff3d00 100%)}
    .menu-card:nth-child(2) .icon{background:radial-gradient(circle at 30% 20%,rgba(255,255,255,.95),rgba(255,255,255,.18) 24%,transparent 26%),linear-gradient(145deg,#ffb703 0%,#fb5607 50%,#d00000 100%)}
    .menu-card:nth-child(3) .icon{background:radial-gradient(circle at 30% 20%,rgba(255,255,255,.95),rgba(255,255,255,.18) 24%,transparent 26%),linear-gradient(145deg,#ffd166 0%,#ff4d00 45%,#ff006e 100%)}
    .menu-card:nth-child(4) .icon{background:radial-gradient(circle at 30% 20%,rgba(255,255,255,.95),rgba(255,255,255,.18) 24%,transparent 26%),linear-gradient(145deg,#ffbe0b 0%,#ff5400 45%,#9d0208 100%)}
    .menu-card:nth-child(5) .icon{background:radial-gradient(circle at 30% 20%,rgba(255,255,255,.95),rgba(255,255,255,.18) 24%,transparent 26%),linear-gradient(145deg,#ffd166 0%,#ff7a18 45%,#6a040f 100%)}
    .menu-card h2{margin:0;font-size:22px;font-weight:1000;letter-spacing:-.45px}
    .menu-card p{position:relative;z-index:2;margin:0;padding-right:42px;color:var(--muted);font-size:14px;line-height:1.45;pointer-events:none}


    .settings-fab{
      position:fixed;right:18px;top:18px;z-index:50;width:54px;height:54px;border-radius:19px;border:1px solid rgba(255,255,255,.22);
      display:grid;place-items:center;cursor:pointer;touch-action:manipulation;color:white;font-size:25px;
      background:linear-gradient(145deg,rgba(255,255,255,.18),rgba(255,255,255,.07));
      box-shadow:0 18px 42px rgba(0,0,0,.38),0 0 24px rgba(255,122,24,.22),inset 0 1px 0 rgba(255,255,255,.20);
      backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    }
    .settings-fab:active{transform:scale(.96)}
    .settings-fab span{display:block;filter:drop-shadow(0 0 10px rgba(255,209,102,.95));animation:gearGlow 2.2s ease-in-out infinite}
    @keyframes gearGlow{0%,100%{transform:rotate(0deg) scale(1);filter:drop-shadow(0 0 10px rgba(255,209,102,.8))}50%{transform:rotate(18deg) scale(1.08);filter:drop-shadow(0 0 16px rgba(255,122,24,1))}}
    .settings-modal{position:fixed;inset:0;z-index:80;display:none;align-items:center;justify-content:center;padding:18px;background:rgba(0,0,0,.56);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
    .settings-modal.active{display:flex;animation:fadeIn .18s ease both}
    .settings-card{width:100%;max-width:480px;border:1px solid rgba(255,255,255,.20);border-radius:30px;padding:18px;
      background:linear-gradient(145deg,rgba(45,18,18,.92),rgba(14,16,27,.92));
      box-shadow:0 28px 80px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.15);
    }
    .settings-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
    .settings-head h2{margin:0;font-size:24px;letter-spacing:-.5px}.settings-head .mini{color:var(--muted);font-size:13px;margin-top:3px}
    .settings-close{width:42px;height:42px;border-radius:15px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.10);color:white;font-size:22px;font-weight:1000;cursor:pointer}
    .settings-grid{display:grid;grid-template-columns:1fr;gap:13px}
    .settings-save{margin-top:15px}
    .panel{
      border:1px solid var(--stroke);border-radius:30px;padding:18px;background:linear-gradient(135deg,rgba(255,255,255,.14),rgba(255,255,255,.06));
      box-shadow:0 26px 70px rgba(0,0,0,.42), inset 0 1px 0 rgba(255,255,255,.12);
      backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    }
    .top-title{text-align:center;margin:18px 0 15px;font-size:31px;letter-spacing:-.8px;font-weight:1000}
    label{display:block;margin:13px 0 8px 2px;color:rgba(255,248,238,.78);font-size:13px;font-weight:900}
    select{
      width:100%;border:none;border-radius:19px;padding:15px 14px;outline:none;font-size:16px;font-weight:900;color:#251008;background:#fff6e8;
      box-shadow:0 16px 34px rgba(0,0,0,.24), inset 0 -1px 0 rgba(0,0,0,.08);
    }
    .main-btn,.ghost-btn{
      width:100%;border-radius:19px;padding:15px 16px;font-size:16px;font-weight:1000;cursor:pointer;touch-action:manipulation;
      transition:transform .14s ease,filter .14s ease;border:none;
    }
    .main-btn{margin-top:17px;color:#210b04;background:linear-gradient(135deg,var(--gold),var(--orange),var(--red));box-shadow:0 18px 38px rgba(255,83,35,.35)}
    .ghost-btn{margin-top:10px;color:var(--text);background:rgba(255,255,255,.10);border:1px solid var(--stroke)}
    .main-btn:active,.ghost-btn:active{transform:scale(.985)}

    .progress{display:inline-flex;align-items:center;gap:8px;margin:8px 0 14px;padding:8px 13px;border-radius:999px;background:rgba(255,255,255,.10);border:1px solid var(--stroke);color:var(--gold);font-size:13px;font-weight:1000}
    .question-card{background:linear-gradient(180deg,#fffaf2,#fff0dd);color:#160907;border-radius:30px;padding:20px;box-shadow:0 28px 70px rgba(0,0,0,.50)}
    .question{font-size:21px;line-height:1.35;font-weight:1000;letter-spacing:-.35px;margin-bottom:17px}
    .answers{display:flex;flex-direction:column;gap:10px}
    .answer{width:100%;border:none;border-radius:18px;padding:15px;text-align:left;font-size:16px;font-weight:950;cursor:pointer;color:white;background:linear-gradient(135deg,#262936,#11131b);box-shadow:0 12px 22px rgba(0,0,0,.18);touch-action:manipulation;transition:transform .12s ease,filter .12s ease}
    .answer:active{transform:scale(.99)}
    .answer.correct{background:linear-gradient(135deg,#00a884,#2be477)!important;color:white!important}
    .answer.wrong{background:linear-gradient(135deg,#ff0844,#ff3d00)!important;color:white!important}
    .answer:disabled{cursor:not-allowed}

    .result-number{text-align:center;font-size:48px;font-weight:1000;margin:8px 0 5px;color:var(--gold)}
    .result-text{text-align:center;color:rgba(255,248,238,.80);margin-bottom:16px;line-height:1.45}
    .wrong-item{background:rgba(255,255,255,.11);border:1px solid var(--stroke);border-radius:18px;padding:14px;margin-bottom:10px;color:rgba(255,248,238,.90);font-size:14px;line-height:1.45}
    .wrong-item b{color:var(--gold)}
    .empty{text-align:center;color:rgba(255,248,238,.72);padding:28px 10px}.mini-note{margin-top:18px;text-align:center;font-size:12px;color:rgba(255,248,238,.50)}
    
.analysis-box{
  margin-top:16px;
  padding:15px;
  border-radius:18px;
  background:rgba(255,255,255,0.10);
  border:1px solid rgba(255,255,255,0.14);
  color:rgba(255,255,255,0.88);
  line-height:1.5;
  font-size:14px;
}
.analysis-box b{color:#ffc26b}
.analysis-box .analysis-title{
  font-size:17px;
  font-weight:950;
  margin-bottom:8px;
  color:#ffc26b;
}


/* Sabit tema sistemi */
body.theme-light{
  --bg:#fff3df;
  --glass:rgba(255,255,255,.66);
  --glass-2:rgba(255,255,255,.82);
  --stroke:rgba(124,45,18,.16);
  --text:#24110a;
  --muted:rgba(36,17,10,.66);
  --primary:#ff8a00;
  --secondary:#d9480f;
  --accent:#7c2d12;
}
body.theme-light{
  background:
    radial-gradient(circle at 18% 12%, rgba(255,138,0,.32), transparent 30%),
    radial-gradient(circle at 88% 10%, rgba(217,72,15,.20), transparent 28%),
    radial-gradient(circle at 60% 88%, rgba(255,193,7,.22), transparent 35%),
    linear-gradient(145deg,#fff7ed 0%,#ffe8c7 45%,#fffaf0 100%);
}
body.theme-light:before{opacity:.32;background-image:linear-gradient(rgba(124,45,18,.055) 1px,transparent 1px),linear-gradient(90deg,rgba(124,45,18,.055) 1px,transparent 1px)}
body.theme-light:after{opacity:.18;background:conic-gradient(from 120deg,transparent,rgba(255,138,0,.18),transparent,rgba(217,72,15,.12),transparent)}
body.theme-light .pill, body.theme-light .yks-counter, body.theme-light .progress{
  background:rgba(255,255,255,.72);
  border-color:rgba(124,45,18,.16);
  color:#7c2d12;
  box-shadow:0 12px 30px rgba(124,45,18,.10);
}
body.theme-light .menu-card, body.theme-light .panel, body.theme-light .settings-card{
  background:linear-gradient(135deg,rgba(255,255,255,.82),rgba(255,255,255,.54));
  border-color:rgba(124,45,18,.16);
  box-shadow:0 22px 55px rgba(124,45,18,.14), inset 0 1px 0 rgba(255,255,255,.65);
}
body.theme-light .menu-card:before{background:linear-gradient(120deg,rgba(255,255,255,.70),transparent 34%,transparent 68%,rgba(255,255,255,.30))}
body.theme-light .settings-fab, body.theme-light .settings-close, body.theme-light .ghost-btn{
  color:#24110a;
  background:rgba(255,255,255,.66);
  border-color:rgba(124,45,18,.16);
}
body.theme-light .question-card{
  background:linear-gradient(180deg,#ffffff,#fff4e1);
  color:#24110a;
  box-shadow:0 24px 60px rgba(124,45,18,.16);
}
body.theme-light .answer{
  color:#2b1209;
  background:linear-gradient(135deg,#fff8ed,#ffd8a8);
  border:1px solid rgba(124,45,18,.13);
  box-shadow:0 10px 22px rgba(124,45,18,.10);
}
body.theme-light .analysis-box, body.theme-light .wrong-item{
  background:rgba(255,255,255,.62);
  border-color:rgba(124,45,18,.14);
  color:rgba(36,17,10,.82);
}
body.theme-light .analysis-box b, body.theme-light .analysis-box .analysis-title, body.theme-light .wrong-item b{color:#b45309}
body.theme-light label{color:rgba(36,17,10,.70)}
body.theme-light select{background:#fffaf2;color:#24110a;border:1px solid rgba(124,45,18,.12)}

@media(max-width:430px){.app{padding:14px 13px 30px}h1{font-size:34px}.question{font-size:19px}.menu-card{border-radius:24px}}
    .wrong-ai-box{
      display:none;margin:14px 0 14px;padding:16px;border-radius:22px;
      background:linear-gradient(135deg,rgba(255,209,102,.16),rgba(255,47,70,.10));
      border:1px solid rgba(255,209,102,.24);
      box-shadow:0 18px 42px rgba(0,0,0,.24), inset 0 1px 0 rgba(255,255,255,.10);
      color:var(--text);line-height:1.5;font-size:14px
    }
    .wrong-ai-box.active{display:block}
    .wrong-ai-box .analysis-title{font-weight:1000;color:var(--gold);font-size:17px;margin-bottom:8px}
    .wrong-ai-box b{color:var(--gold)}
    body.theme-light .wrong-ai-box{
      color:#4d241d;background:linear-gradient(135deg,rgba(255,231,186,.88),rgba(255,239,230,.84));
      border-color:rgba(234,107,59,.20)
    }
    body.theme-light .wrong-ai-box .analysis-title, body.theme-light .wrong-ai-box b{color:#b45309}

:root{
  --bg:#eef4ff;
  --glass:#ffffff;
  --glass-2:#f6f9ff;
  --stroke:#d9e5f7;
  --text:#102033;
  --muted:#65758b;
  --primary:#2563eb;
  --secondary:#0f766e;
  --accent:#38bdf8;
  --orange:#2563eb;
  --red:#ef4444;
  --gold:#0ea5e9;
  --dark:#ffffff;
  --green:#16a34a;
}
html{background:#eef4ff!important}
body{
  color:var(--text)!important;
  background:
    radial-gradient(circle at 18% 8%, rgba(56,189,248,.22), transparent 32%),
    radial-gradient(circle at 92% 18%, rgba(37,99,235,.13), transparent 28%),
    linear-gradient(180deg,#f8fbff 0%,#eef4ff 55%,#e7f0ff 100%)!important;
}
body:before{
  opacity:.45!important;
  background-image:
    linear-gradient(rgba(37,99,235,.045) 1px,transparent 1px),
    linear-gradient(90deg,rgba(37,99,235,.035) 1px,transparent 1px)!important;
  background-size:34px 34px!important;
  mask-image:none!important;
}
body:after{display:none!important}

.pill,.yks-counter{
  background:rgba(255,255,255,.78)!important;
  border:1px solid rgba(217,229,247,.95)!important;
  color:#1d4ed8!important;
  box-shadow:0 10px 28px rgba(15,35,70,.08)!important;
}
.yks-counter .dot{background:#38bdf8!important;box-shadow:0 0 12px rgba(56,189,248,.45)!important}
.yks-counter b{color:#1d4ed8!important}

h1,.top-title{
  color:#102033!important;
  text-shadow:none!important;
  letter-spacing:-.9px!important;
}
.hero{padding-top:18px!important}
.menu{gap:13px!important}
.menu-card{
  min-height:112px!important;
  border-radius:24px!important;
  background:rgba(255,255,255,.82)!important;
  border:1px solid rgba(217,229,247,.95)!important;
  color:#102033!important;
  box-shadow:0 18px 44px rgba(15,35,70,.10), inset 0 1px 0 rgba(255,255,255,.80)!important;
  padding:18px!important;
}
.menu-card:before{
  content:""!important;
  position:absolute!important;
  inset:0!important;
  pointer-events:none!important;
  background:linear-gradient(135deg,rgba(56,189,248,.12),transparent 42%,rgba(37,99,235,.06))!important;
  opacity:1!important;
}
.menu-card:after{
  content:""!important;
  position:absolute!important;
  right:-34px!important;
  top:-34px!important;
  width:112px!important;
  height:112px!important;
  border-radius:50%!important;
  background:radial-gradient(circle,rgba(56,189,248,.26),rgba(37,99,235,.12) 55%,transparent 72%)!important;
  display:block!important;
}
.menu-card:hover{
  transform:translateY(-2px)!important;
  background:#ffffff!important;
  border-color:#bfd7ff!important;
}
.menu-top{gap:13px!important;margin-bottom:10px!important}
.icon{
  width:52px!important;
  height:52px!important;
  flex-basis:52px!important;
  border-radius:18px!important;
  background:linear-gradient(135deg,#e0f2fe,#dbeafe)!important;
  border:1px solid #c7ddfb!important;
  box-shadow:0 10px 22px rgba(37,99,235,.10), inset 0 1px 0 rgba(255,255,255,.85)!important;
  text-shadow:none!important;
  animation:none!important;
  filter:none!important;
}
.icon:before,.icon:after{display:none!important}
.menu-card h2{
  color:#102033!important;
  font-size:21px!important;
}
.menu-card p,.hero p{color:#65758b!important}

.panel,.settings-card{

    for(var j=0;j<q.options.length;j++) uniquePush(opts,q.options[j]);

function buildWorkToAuthor(){var data=getAuthorData(),owner={},res=[];for(var i=0;i<data.length;i++){for(var j=0;j<data[i][2].length;j++){var work=data[i][2][j];if(!owner[work])owner[work]=[];uniquePush(owner[work],data[i][1])}}for(var a=0;a<data.length;a++){var period=data[a][0],author=data[a][1];for(var w=0;w<data[a][2].length;w++){var workName=data[a][2][w];if(owner[workName]&&owner[workName].length>1)continue;res.push({question:'"'+workName+'" adlı eser kime aittir?',answer:author,options:shuffle([author].concat(chooseWrongAuthors(author,period)))})}}return res}
function normalizeCharacterText(t){
  return String(t).toLocaleLowerCase('tr-TR')
    .replace(/ı/g,'i').replace(/ğ/g,'g').replace(/ü/g,'u').replace(/ş/g,'s').replace(/ö/g,'o').replace(/ç/g,'c')
    .replace(/[^a-z0-9]+/g,' ').replace(/\s+/g,' ').trim();
}
function cleanCharacterList(work,chars){
  var w=normalizeCharacterText(work),out=[];
  for(var i=0;i<chars.length;i++){
    var ch=chars[i],c=normalizeCharacterText(ch);
    if(!c)continue;
    // Eser adıyla birebir aynı olan kahramanı çıkar: Cezmi/Cezmi, Zehra/Zehra, Nur Baba/Nur Baba gibi.
    if(c===w)continue;
    // Eser adının sonundaki isimle birebir aynıysa çıkar: İnce Memed / Memed gibi.
    if(c.length>=4 && (w==='ince '+c || w.endsWith(' '+c)))continue;
    out.push(ch);
  }
  return out;
}
function buildCharacterQuestions(src){
  var res=[];

    var shown=cleanCharacterList(src[c][0],src[c][1]);
    if(shown.length===0)continue;
    res.push({question:shown.join(', ')+' hangi eserin kahramanlarıdır?',answer:src[c][0],options:shuffle([src[c][0]].concat(chooseWrongWorksForCharacter(src[c][0]))),topic:'Roman Kahramanları'});
  }
  return res;
}

function balancedMovementQuestions(pool,count){
  var groups={},keys=[],result=[];
  for(var i=0;i<pool.length;i++){
    var a=pool[i].answer;
    if(!groups[a]){groups[a]=[];keys.push(a)}
    groups[a].push(pool[i]);
  }
  for(var k=0;k<keys.length;k++)groups[keys[k]]=shuffle(groups[keys[k]]);
  keys=shuffle(keys);
  while(result.length<count){
    var added=false;
    for(var x=0;x<keys.length && result.length<count;x++){
      var key=keys[x];
      if(groups[key].length){result.push(groups[key].shift());added=true}
    }
    if(!added)break;
    keys=shuffle(keys);
  }
  return result;
}

function inferMistakeType(m){
  var q=m.question||'', a=m.answer||'';
  if(currentCategory==='movements' || q.indexOf('edebi akım')>-1 || q.indexOf('akımı')>-1 || q.indexOf('akımla')>-1)return 'Edebi Akım';
  if(currentCategory==='characters' || q.indexOf('kahramanlarıdır')>-1)return 'Roman Kahramanı';
  if(q.indexOf('adlı eser kime aittir')>-1)return 'Eser → Yazar';
  if(q.indexOf('adlı sanatçının eseri')>-1)return 'Yazar → Eser';
  return 'Genel';
}
function getShortMistakeLabel(m){
  var q=m.question||'', ans=m.answer||'';
  var m1=q.match(/"(.+?)" adlı eser kime aittir\?/);
  if(m1)return '“'+m1[1]+'” → '+ans;
  var m2=q.match(/^(.+?) adlı sanatçının eseri hangisidir\?/);
  if(m2)return m2[1]+' → '+ans;
  if(q.indexOf('kahramanlarıdır')>-1)return ans+' kahramanları';
  if(q.indexOf('edebi akım')>-1 || q.indexOf('akımı')>-1 || q.indexOf('akımla')>-1)return ans+' akımı';
  return ans;
}
function getWrongSummary(){
  var counts={}, types={}, examples=[];
  for(var i=0;i<sessionMistakes.length;i++){
    var m=sessionMistakes[i], typ=inferMistakeType(m), key='';
    if(typ==='Edebi Akım')key=m.answer;
    else if(typ==='Roman Kahramanı')key=m.answer;
    else key=getAuthorPeriod(m.answer)||getWorkPeriod(m.answer)||'Genel';
    counts[key]=(counts[key]||0)+1;
    types[typ]=(types[typ]||0)+1;
    if(examples.length<4)examples.push(getShortMistakeLabel(m));
  }
  var topKey='',topVal=0,topType='',topTypeVal=0;
  for(var k in counts){if(counts[k]>topVal){topVal=counts[k];topKey=k}}
  for(var t in types){if(types[t]>topTypeVal){topTypeVal=types[t];topType=t}}
  return {area:topKey,areaCount:topVal,type:topType,typeCount:topTypeVal,examples:examples};
}

  }else if(p>=55){

    return title+'Tek yanlışın var: <b>'+getShortMistakeLabel(one)+'</b>.<br>'+msg+'<br><b>Öneri:</b> Bu eşleşmeyi deftere yaz, aynı ayarda 10 soru daha çöz.';
  }

  var specific='';
  if(currentCategory==='movements'){
    specific='Yanlışların özellikle <b>'+s.area+'</b> çevresinde. Akımı özellikleriyle değil, temsilci + anahtar kelimeyle bağla. Örnek: Romantizm = duygu/hayal; Realizm = gözlem/nesnellik; Sembolizm = musiki/kapalılık.';
  }else if(currentCategory==='characters'){

  }else if(currentCategory==='authorWork'){
    specific='Bu testte en çok <b>'+s.area+'</b> tarafı karışmış. Seçtiğin dönemden sadece yanlış çıkan yazar-eserleri tekrar et; tüm listeyi baştan okuma.';
  }else{
    specific='Yanlışların <b>'+s.area+'</b> çevresinde toplanıyor.';
  }

  return title+msg+'<br>'+specific+ex+'<br><b>Çalışma önerisi:</b> Yanlış çıkan '+Math.min(wrong,4)+' eşleşmeyi 2 dakika tekrar et, sonra aynı bölümden 10 soru daha çöz.';
}

function categoryFromQuestionText(text){
  text=String(text||'');
  if(text.indexOf('hangi eserin kahramanlarıdır')!==-1)return 'Roman kahramanı';
  if(text.indexOf('hangi edebi akıma')!==-1||text.indexOf('edebi akımla')!==-1)return 'Edebi akım';
  if(text.indexOf('kime aittir')!==-1)return 'Eser → Yazar';
  if(text.indexOf('sanatçının eseri')!==-1)return 'Yazar → Eser';
  if(text.indexOf('ilk')!==-1||text.indexOf('İlk')!==-1)return 'İlkler';
  return 'Genel';
}

  }else if(topType==='İlkler'){
    advice='<b>İlkler</b> kısmında hata var. Bunlar direkt ezber sorusu; her gün 10 tane hızlı tekrar en verimli yöntem olur.';

    advice='Yanlışların karışık dağılmış. Şimdilik yanlış çıkan ilk 5 soruyu tekrar et, sonra aynı bölümden 10 soru çöz.';

function shuffle(array){var arr=array.slice();for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),tmp=arr[i];arr[i]=arr[j];arr[j]=tmp}return arr}

  var diff=localStorage.getItem('edebiyatDifficulty');
  if(opt&&byId('optionCountSelect'))byId('optionCountSelect').value=opt;
  if(diff&&byId('difficultySelect'))byId('difficultySelect').value=diff;
}
function saveGlobalSettings(){
  var mode=byId('themeModeSelect')?byId('themeModeSelect').value:'dark';
  localStorage.setItem('edebiyatThemeMode',mode);
  if(byId('optionCountSelect'))localStorage.setItem('edebiyatOptionCount',byId('optionCountSelect').value);
  if(byId('difficultySelect'))localStorage.setItem('edebiyatDifficulty',byId('difficultySelect').value);
  applyThemeSettings({mode:mode});
  closeGlobalSettings();
}
function resetThemeDefaults(){
  localStorage.setItem('edebiyatThemeMode','dark');
  applyThemeSettings({mode:'dark'});loadThemeControls();
}


function updateYksCounter(){
  var el=byId('yksCounter');
  if(!el)return;
  var target=new Date('2026-06-20T10:15:00+03:00');
  var now=new Date();
  var diff=target.getTime()-now.getTime();
  if(diff<=0){
    el.innerHTML='<span class="dot"></span><span><b>YKS başladı.</b></span>';
    return;
  }
  var totalSeconds=Math.floor(diff/1000);
  var days=Math.floor(totalSeconds/86400);
  var hours=Math.floor((totalSeconds%86400)/3600);
  var mins=Math.floor((totalSeconds%3600)/60);
  el.innerHTML='<span class="dot"></span><span>TYT’ye <b>'+days+'</b> gün <b>'+hours+'</b> saat <b>'+mins+'</b> dk kaldı</span>';
}

function openGlobalSettings(){byId('globalSettingsModal').classList.add('active');byId('globalSettingsModal').setAttribute('aria-hidden','false')}
function closeGlobalSettings(){byId('globalSettingsModal').classList.remove('active');byId('globalSettingsModal').setAttribute('aria-hidden','true')}
document.addEventListener('DOMContentLoaded',function(){
  applyThemeSettings();
  loadThemeControls();
  updateYksCounter();
  setInterval(updateYksCounter,60000);
  var opens=document.querySelectorAll('[data-open]');
  for(var i=0;i<opens.length;i++)opens[i].addEventListener('click',function(){openSettings(this.getAttribute('data-open'))});
  var homes=document.querySelectorAll('[data-home]');
  for(var h=0;h<homes.length;h++)homes[h].addEventListener('click',goHome);
  byId('btnWrongs').addEventListener('click',showWrongs);
  byId('startBtn').addEventListener('click',startTest);
  byId('repeatBtn').addEventListener('click',repeatSameTest);
  byId('clearWrongBtn').addEventListener('click',clearWrongs);
  byId('wrongAiBtn').addEventListener('click',analyzeStoredWrongs);
  byId('globalSettingsBtn').addEventListener('click',function(){loadThemeControls();openGlobalSettings()});
  byId('globalSettingsClose').addEventListener('click',closeGlobalSettings);
  byId('globalSettingsSave').addEventListener('click',saveGlobalSettings);
  byId('globalSettingsModal').addEventListener('click',function(e){if(e.target===this)closeGlobalSettings()});
  if(byId('themeModeSelect'))byId('themeModeSelect').addEventListener('change',function(){applyThemeSettings({mode:this.value})});
});
})();
</script>
</body>
</html>
