<body>
<div class="app">
  <div id="homeScreen" class="screen active">
    <h1>Edebiyat Test</h1><div class="subtitle">YKS edebiyat ezber uygulaması</div>
    <div class="menu">
      <button class="card c1" onclick="openSettings('authorWork')">Yazar - Eser<small>Dönem seç, yazar-eser çalış</small></button>
      <button class="card c2" onclick="openSettings('movements')">Edebi Akımlar<small>Akım özellikleri, temsilciler ve dönem bilgileri</small></button>
      <button class="card c3" onclick="openSettings('characters')">Roman Kahramanları<small>Kahramanlardan eseri bul</small></button>
      <button class="card c5" onclick="showWrongs()">Yanlışlarım<small>Yanlış yaptığın soruları gör</small></button>
    </div>
  </div>
  <div id="settingsScreen" class="screen">
    <h1 id="settingsTitle">Test Ayarları</h1>
    <div class="panel">
      <div id="periodWrap"><label for="periodSelect">Dönem seç</label><select id="periodSelect"></select></div>

      <button class="main-btn" onclick="startTest()">Teste Başla</button>
      <button class="back-btn" onclick="goHome()">Geri Dön</button>
    </div>
  </div>
  <div id="testScreen" class="screen"><div class="progress" id="progressText"></div><div class="question-box"><div class="question" id="questionText"></div><div class="answers" id="answers"></div></div><button class="back-btn" onclick="goHome()">Testi Bitir</button></div>
  <div id="resultScreen" class="screen"><div class="panel"><div class="result-title">Test Bitti</div><div class="score" id="scoreText"></div><button class="main-btn" onclick="goHome()">Ana Menü</button></div></div>
  <div id="wrongScreen" class="screen"><h1>Yanlışlarım</h1><div id="wrongList"></div><button class="main-btn" onclick="clearWrongs()">Yanlışları Temizle</button><button class="back-btn" onclick="goHome()">Geri Dön</button></div>
</div>

function openSettings(category){currentCategory=category;const title=document.getElementById('settingsTitle'),typeWrap=document.getElementById('typeWrap'),periodWrap=document.getElementById('periodWrap'),typeSelect=document.getElementById('questionType'),periodSelect=document.getElementById('periodSelect'),countSelect=document.getElementById('questionCount');typeSelect.innerHTML='';periodSelect.innerHTML='';countSelect.innerHTML='';for(let i=10;i<=100;i+=10)addOption(countSelect,String(i),i+' soru');typeWrap.classList.add('hidden');periodWrap.classList.add('hidden');
 if(category==='authorWork'){title.textContent='Yazar - Eser';typeWrap.classList.remove('hidden');periodWrap.classList.remove('hidden');addOption(typeSelect,'authorToWork','Yazar - Eser');addOption(typeSelect,'workToAuthor','Eser - Yazar');fillPeriods()}
 if(category==='movements'){title.textContent='Edebi Akımlar'}
 if(category==='characters'){title.textContent='Roman Kahramanları'}
 showScreen('settingsScreen')}
function fillPeriods(){const p=document.getElementById('periodSelect');addOption(p,'Tüm Dönemler','Tüm Dönemler');[...new Set(authorWorks.map(x=>x.period))].forEach(period=>addOption(p,period,period))}
function startTest(){questionLimit=Number(document.getElementById('questionCount').value);currentType=document.getElementById('questionType').value||'workToAuthor';selectedPeriod=currentCategory==='authorWork'?(document.getElementById('periodSelect').value||'Tüm Dönemler'):'Tüm Dönemler';questions=shuffle(buildQuestions()).slice(0,questionLimit);currentIndex=0;correctCount=0;wrongCount=0;showScreen('testScreen');showQuestion()}
function filteredAuthorWorks(){return selectedPeriod==='Tüm Dönemler'?authorWorks:authorWorks.filter(x=>x.period===selectedPeriod)}
function buildQuestions(){if(currentCategory==='authorWork')return currentType==='authorToWork'?buildAuthorToWork():buildWorkToAuthor();if(currentCategory==='characters')return buildCharsToWork();if(currentCategory==='movements')return buildMovementQuestions();return[]}
function buildWorkToAuthor(){const data=filteredAuthorWorks(),authors=[...new Set(data.map(x=>x.author))];let r=[];data.forEach(item=>item.works.forEach(work=>r.push({question:`"${work}" adlı eser kime aittir?`,correct:item.author,options:shuffle([item.author,...getRandomWrong(authors,item.author,4)])})));return r}
function buildAuthorToWork(){const data=filteredAuthorWorks(),allWorks=data.flatMap(x=>x.works);let r=[];data.forEach(item=>item.works.forEach(work=>r.push({question:`${item.author} adlı sanatçının eseri hangisidir?`,correct:work,options:shuffle([work,...getRandomWrong(allWorks,work,4)])})));return r}
function buildCharsToWork(){const works=characters.map(x=>x.work);return characters.map(item=>({question:`${item.chars.join(', ')} hangi eserin kahramanlarıdır?`,correct:item.work,options:shuffle([item.work,...getRandomWrong(works,item.work,4)])}))}
function buildMovementQuestions(){let r=[];const names=movements.map(x=>x.name);movements.forEach(m=>{r.push({question:`${shuffle(m.features).slice(0,4).join(', ')} özellikleri hangi edebi akımı çağrıştırır?`,correct:m.name,options:shuffle([m.name,...getRandomWrong(names,m.name,4)])});m.extra.forEach(info=>r.push({question:`${info} Hangi edebi akımla ilişkilidir?`,correct:m.name,options:shuffle([m.name,...getRandomWrong(names,m.name,4)])}))});return r}
function showQuestion(){if(currentIndex>=questions.length){finishTest();return}const q=questions[currentIndex];document.getElementById('progressText').textContent=`${currentIndex+1} / ${questions.length}`;document.getElementById('questionText').textContent=q.question;const div=document.getElementById('answers');div.innerHTML='';q.options.forEach(option=>{const btn=document.createElement('button');btn.className='answer';btn.textContent=option;btn.onclick=()=>answerQuestion(btn,option,q);div.appendChild(btn)})}
function answerQuestion(button,selected,q){const buttons=document.querySelectorAll('.answer');buttons.forEach(b=>b.disabled=true);if(selected===q.correct){correctCount++;button.classList.add('correct')}else{wrongCount++;button.classList.add('wrong');buttons.forEach(b=>{if(b.textContent===q.correct)b.classList.add('correct')});saveWrong(q.question,selected,q.correct)}setTimeout(()=>{currentIndex++;showQuestion()},850)}
function finishTest(){document.getElementById('scoreText').innerHTML=`Doğru: <b>${correctCount}</b><br>Yanlış: <b>${wrongCount}</b>`;showScreen('resultScreen')}
function saveWrong(question,selected,correct){const wrongs=JSON.parse(localStorage.getItem('wrongs')||'[]');wrongs.unshift({question,selected,correct,date:new Date().toLocaleString('tr-TR')});localStorage.setItem('wrongs',JSON.stringify(wrongs))}
function showWrongs(){const wrongs=JSON.parse(localStorage.getItem('wrongs')||'[]'),list=document.getElementById('wrongList');list.innerHTML='';if(wrongs.length===0)list.innerHTML='<div class="empty">Henüz yanlış yok kanka.</div>';else wrongs.forEach(w=>{const d=document.createElement('div');d.className='wrong-item';d.innerHTML=`<b>Soru:</b> ${w.question}<br><b>Senin cevabın:</b> ${w.selected}<br><b>Doğru cevap:</b> ${w.correct}<br><small>${w.date}</small>`;list.appendChild(d)});showScreen('wrongScreen')}
function clearWrongs(){localStorage.removeItem('wrongs');showWrongs()}function getRandomWrong(array,correct,count){return shuffle([...new Set(array)].filter(x=>x!==correct)).slice(0,count)}function shuffle(array){const a=[...array];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
</script>
