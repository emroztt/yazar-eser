<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edebiyat Test</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Arial, sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at top left, rgba(255, 87, 34, 0.35), transparent 30%),
        radial-gradient(circle at bottom right, rgba(255, 193, 7, 0.22), transparent 28%),
        linear-gradient(135deg, #130b0b 0%, #251015 35%, #0f111a 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 38px 38px;
      pointer-events: none;
      opacity: 0.45;
    }

    .app {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 540px;
      margin: 0 auto;
      padding: 18px 16px 32px;
    }

    .screen {
      display: none;
      animation: fadeIn 0.25s ease;
    }

    .screen.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .brand {
      margin: 18px 0 24px;
      text-align: center;
    }

    .badge {
      display: inline-block;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.14);
      color: #ffc46b;
      font-size: 12px;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.05;
      letter-spacing: -1px;
    }

    .brand p {
      margin: 10px auto 0;
      color: rgba(255,255,255,0.72);
      font-size: 15px;
      line-height: 1.45;
      max-width: 380px;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .menu-card {
      position: relative;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 24px;
      padding: 20px 18px;
      text-align: left;
      color: white;
      cursor: pointer;
      overflow: hidden;
      background: rgba(255,255,255,0.085);
      box-shadow: 0 18px 42px rgba(0,0,0,0.34);
      backdrop-filter: blur(14px);
      transition: transform 0.17s ease, border-color 0.17s ease, background 0.17s ease;
    }

    .menu-card:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 193, 7, 0.45);
      background: rgba(255,255,255,0.12);
    }

    .menu-card:active {
      transform: scale(0.98);
    }

    .menu-card::after {
      content: "";
      position: absolute;
      right: -35px;
      top: -35px;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(255, 87, 34, 0.75), rgba(255, 193, 7, 0.45));
      opacity: 0.8;
    }

    .menu-card .icon {
      width: 44px;
      height: 44px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      margin-bottom: 14px;
      font-size: 22px;
      background: linear-gradient(135deg, #ff3d00, #ffb300);
      box-shadow: 0 10px 22px rgba(255, 87, 34, 0.25);
    }

    .menu-card h2 {
      margin: 0 0 6px;
      font-size: 21px;
      letter-spacing: -0.3px;
    }

    .menu-card p {
      margin: 0;
      color: rgba(255,255,255,0.72);
      font-size: 14px;
      line-height: 1.4;
      padding-right: 35px;
    }

    .panel {
      background: rgba(255,255,255,0.095);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 26px;
      padding: 18px;
      box-shadow: 0 18px 42px rgba(0,0,0,0.34);
      backdrop-filter: blur(14px);
    }

    .top-title {
      margin: 18px 0 14px;
      text-align: center;
      font-size: 29px;
      letter-spacing: -0.6px;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 13px;
      color: rgba(255,255,255,0.78);
      margin: 0 0 8px 2px;
      font-weight: 700;
    }

    select {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 17px;
      padding: 15px 14px;
      outline: none;
      font-size: 16px;
      background: #fff7ed;
      color: #24100b;
      font-weight: 700;
      box-shadow: 0 12px 24px rgba(0,0,0,0.18);
    }

    .main-btn, .ghost-btn {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 15px 16px;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.15s ease, filter 0.15s ease;
    }

    .main-btn {
      margin-top: 8px;
      color: #1d0a04;
      background: linear-gradient(135deg, #ffb300, #ff3d00);
      box-shadow: 0 14px 30px rgba(255, 91, 0, 0.35);
    }

    .ghost-btn {
      margin-top: 10px;
      color: white;
      background: rgba(255,255,255,0.11);
      border: 1px solid rgba(255,255,255,0.15);
    }

    .main-btn:hover, .ghost-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .main-btn:active, .ghost-btn:active {
      transform: scale(0.98);
    }

    .progress {
      display: inline-block;
      margin: 8px 0 14px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      color: #ffcc80;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.14);
    }

    .question-card {
      background: rgba(255,255,255,0.97);
      color: #160b09;
      border-radius: 27px;
      padding: 20px;
      box-shadow: 0 20px 48px rgba(0,0,0,0.42);
    }

    .question {
      font-size: 21px;
      line-height: 1.35;
      font-weight: 900;
      letter-spacing: -0.35px;
      margin-bottom: 17px;
    }

    .answers {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .answer {
      width: 100%;
      border: none;
      border-radius: 17px;
      padding: 15px;
      text-align: left;
      font-size: 16px;
      font-weight: 850;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #232631, #11131a);
      box-shadow: 0 9px 18px rgba(0,0,0,0.18);
      transition: transform 0.14s ease, filter 0.14s ease;
    }

    .answer:hover {
      transform: translateY(-1px);
      filter: brightness(1.12);
    }

    .answer.correct {
      background: linear-gradient(135deg, #00b09b, #1fdd6d) !important;
      color: white !important;
    }

    .answer.wrong {
      background: linear-gradient(135deg, #ff0844, #ff3d00) !important;
      color: white !important;
    }

    .answer:disabled {
      cursor: not-allowed;
    }

    .result-number {
      text-align: center;
      font-size: 44px;
      font-weight: 950;
      margin: 10px 0 4px;
      color: #ffb300;
    }

    .result-text {
      text-align: center;
      color: rgba(255,255,255,0.78);
      margin-bottom: 16px;
      line-height: 1.45;
    }

    .wrong-item {
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 10px;
      line-height: 1.45;
      color: rgba(255,255,255,0.88);
      font-size: 14px;
    }

    .wrong-item b {
      color: #ffcc80;
    }

    .empty {
      text-align: center;
      color: rgba(255,255,255,0.70);
      padding: 30px 10px;
    }

    .mini-note {
      text-align: center;
      color: rgba(255,255,255,0.55);
      font-size: 12px;
      margin-top: 18px;
    }

    @media (max-width: 420px) {
      .app {
        padding: 14px 13px 28px;
      }

      h1 {
        font-size: 30px;
      }

      .question {
        font-size: 19px;
      }

      .menu-card {
        border-radius: 22px;
        padding: 18px 16px;
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <div id="homeScreen" class="screen active">
      <div class="brand">
        <div class="badge">YKS Edebiyat</div>
        <h1>Edebiyat Test</h1>
        <p>Yazar-eser, roman kahramanları ve edebi akımları hızlı tekrar et.</p>
      </div>

      <div class="menu">
        <button class="menu-card" onclick="openSettings('authorWork')">
          <div class="icon">✍️</div>
          <h2>Yazar - Eser</h2>
          <p>Dönem seç, istersen yazardan eseri istersen eserden yazarı bul.</p>
        </button>

        <button class="menu-card" onclick="openSettings('movements')">
          <div class="icon">🔥</div>
          <h2>Edebi Akımlar</h2>
          <p>Özellik, dönem bilgisi ve temsilciler üzerinden akımı bul.</p>
        </button>

        <button class="menu-card" onclick="openSettings('characters')">
          <div class="icon">🎭</div>
          <h2>Roman Kahramanları</h2>
          <p>Kahramanlar verilsin, hangi esere ait olduğunu seç.</p>
        </button>

        <button class="menu-card" onclick="showWrongs()">
          <div class="icon">📌</div>
          <h2>Yanlışlarım</h2>
          <p>Yanlış yaptığın soruları tekrar gör.</p>
        </button>
      </div>

      <div class="mini-note">GitHub Pages üzerinde çalışır. PC kapalı olsa da link açık kalır.</div>
    </div>

    <div id="settingsScreen" class="screen">
      <h1 class="top-title" id="settingsTitle">Test Ayarları</h1>

      <div class="panel">
        <div class="field" id="periodBox">
          <label for="periodSelect">Dönem seç</label>
          <select id="periodSelect"></select>
        </div>

        <div class="field" id="typeBox">
          <label for="typeSelect">Soru tipi seç</label>
          <select id="typeSelect"></select>
        </div>

        <div class="field">
          <label for="countSelect">Kaç soru olsun?</label>
          <select id="countSelect"></select>
        </div>

        <button class="main-btn" onclick="startTest()">Teste Başla</button>
        <button class="ghost-btn" onclick="goHome()">Ana Menü</button>
      </div>
    </div>

    <div id="testScreen" class="screen">
      <div class="progress" id="progressText">1 / 10</div>

      <div class="question-card">
        <div class="question" id="questionText"></div>
        <div class="answers" id="answers"></div>
      </div>

      <button class="ghost-btn" onclick="goHome()">Testi Bitir</button>
    </div>

    <div id="resultScreen" class="screen">
      <h1 class="top-title">Sonuç</h1>
      <div class="panel">
        <div class="result-number" id="resultNumber">0/10</div>
        <div class="result-text" id="resultText"></div>
        <button class="main-btn" onclick="repeatSameTest()">Aynı Testten Tekrar Çöz</button>
        <button class="ghost-btn" onclick="goHome()">Ana Menü</button>
      </div>
    </div>

    <div id="wrongScreen" class="screen">
      <h1 class="top-title">Yanlışlarım</h1>
      <div id="wrongList"></div>
      <button class="main-btn" onclick="clearWrongs()">Yanlışları Temizle</button>
      <button class="ghost-btn" onclick="goHome()">Ana Menü</button>
    </div>

  </div>

        authors: ["Jean-Paul Sartre", "Albert Camus", "Dostoyevski"]
      }
    ];

    var currentCategory = "";
    var currentType = "";
    var currentPeriod = "Tüm Dönemler";
    var currentCount = 10;
    var currentQuestions = [];
    var currentIndex = 0;
    var correctCount = 0;
    var wrongCount = 0;
    var lastSettings = null;

    function showScreen(id) {
      var screens = document.getElementsByClassName("screen");
      for (var i = 0; i < screens.length; i++) {
        screens[i].classList.remove("active");
      }
      document.getElementById(id).classList.add("active");
      window.scrollTo(0, 0);
    }

    function goHome() {
      showScreen("homeScreen");
    }

    function openSettings(category) {
      currentCategory = category;

      var title = document.getElementById("settingsTitle");
      var periodBox = document.getElementById("periodBox");
      var typeBox = document.getElementById("typeBox");
      var periodSelect = document.getElementById("periodSelect");
      var typeSelect = document.getElementById("typeSelect");
      var countSelect = document.getElementById("countSelect");

      periodSelect.innerHTML = "";
      typeSelect.innerHTML = "";
      countSelect.innerHTML = "";

      for (var c = 10; c <= 100; c += 10) {
        addOption(countSelect, String(c), c + " soru");
      }

      if (category === "authorWork") {
        title.innerText = "Yazar - Eser";
        periodBox.style.display = "block";
        typeBox.style.display = "block";

        var periods = ["Tüm Dönemler", "Halk Edebiyatı", "Divan / Geçiş", "Tanzimat", "Servetifünun", "Fecriati", "Milli Edebiyat", "Cumhuriyet"];
        for (var p = 0; p < periods.length; p++) {
          addOption(periodSelect, periods[p], periods[p]);
        }

        addOption(typeSelect, "authorToWork", "Yazar - Eser");
        addOption(typeSelect, "workToAuthor", "Eser - Yazar");
      }

      if (category === "movements") {
        title.innerText = "Edebi Akımlar";
        periodBox.style.display = "none";
        typeBox.style.display = "none";
      }

      if (category === "characters") {
        title.innerText = "Roman Kahramanları";
        periodBox.style.display = "none";
        typeBox.style.display = "none";
      }

      showScreen("settingsScreen");
    }

    function addOption(select, value, text) {
      var option = document.createElement("option");
      option.value = value;
      option.text = text;
      select.appendChild(option);
    }

    function startTest() {
      currentCount = Number(document.getElementById("countSelect").value);

      if (currentCategory === "authorWork") {
        currentPeriod = document.getElementById("periodSelect").value;
        currentType = document.getElementById("typeSelect").value;
      } else {
        currentPeriod = "Tüm Dönemler";
        currentType = currentCategory;
      }

      lastSettings = {
        category: currentCategory,
        type: currentType,
        period: currentPeriod,
        count: currentCount
      };

      currentQuestions = buildQuestions(currentCategory, currentType, currentPeriod);
      currentQuestions = shuffle(currentQuestions);

      if (currentQuestions.length > currentCount) {
        currentQuestions = currentQuestions.slice(0, currentCount);
      }

      currentIndex = 0;
      correctCount = 0;
      wrongCount = 0;

      showScreen("testScreen");
      showQuestion();
    }

    function repeatSameTest() {
      if (!lastSettings) {
        goHome();
        return;
      }

      currentCategory = lastSettings.category;
      currentType = lastSettings.type;
      currentPeriod = lastSettings.period;
      currentCount = lastSettings.count;

      currentQuestions = buildQuestions(currentCategory, currentType, currentPeriod);
      currentQuestions = shuffle(currentQuestions);

      if (currentQuestions.length > currentCount) {
        currentQuestions = currentQuestions.slice(0, currentCount);
      }

      currentIndex = 0;
      correctCount = 0;
      wrongCount = 0;

      showScreen("testScreen");
      showQuestion();
    }

    function buildQuestions(category, type, period) {
      if (category === "authorWork") {
        if (type === "authorToWork") return buildAuthorToWork(period);
        if (type === "workToAuthor") return buildWorkToAuthor(period);
      }

      if (category === "movements") {
        return buildMovementQuestions();
      }

      if (category === "characters") {
        return buildCharacterQuestions();
      }

      return [];
    }

    function getAuthorData(period) {
      if (period === "Tüm Dönemler") {
        return authorWorks.slice();
      }

      var list = [];
      for (var i = 0; i < authorWorks.length; i++) {
        if (authorWorks[i].period === period) {
          list.push(authorWorks[i]);
        }
      }
      return list;
    }

    function buildAuthorToWork(period) {
      var data = getAuthorData(period);
      var allWorks = [];
      var result = [];

      for (var i = 0; i < data.length; i++) {
        for (var j = 0; j < data[i].works.length; j++) {
          allWorks.push(data[i].works[j]);
        }
      }

      for (var a = 0; a < data.length; a++) {
        for (var w = 0; w < data[a].works.length; w++) {
          var correct = data[a].works[w];
          var wrongs = getRandomWrong(allWorks, correct, 4);
          result.push({
            question: data[a].author + " adlı sanatçının eseri hangisidir?",
            correct: correct,
            options: shuffle([correct].concat(wrongs))
          });
        }
      }

      return result;
    }

    function buildWorkToAuthor(period) {
      var data = getAuthorData(period);
      var authors = [];
      var result = [];

      for (var i = 0; i < data.length; i++) {
        authors.push(data[i].author);
      }

      for (var a = 0; a < data.length; a++) {
        for (var w = 0; w < data[a].works.length; w++) {
          var work = data[a].works[w];
          var correct = data[a].author;
          var wrongs = getRandomWrong(authors, correct, 4);
          result.push({
            question: '"' + work + '" adlı eser kime aittir?',
            correct: correct,
            options: shuffle([correct].concat(wrongs))
          });
        }
      }

      return result;
    }

    function buildCharacterQuestions() {
      var works = [];
      var result = [];

      for (var i = 0; i < characters.length; i++) {
        works.push(characters[i].work);
      }

      for (var c = 0; c < characters.length; c++) {
        var correct = characters[c].work;
        var wrongs = getRandomWrong(works, correct, 4);
        result.push({
          question: characters[c].chars.join(", ") + " hangi eserin kahramanlarıdır?",
          correct: correct,
          options: shuffle([correct].concat(wrongs))
        });
      }

      return result;
    }

    function buildMovementQuestions() {
      var result = [];
      var names = [];
      var allClues = [];

      for (var i = 0; i < movements.length; i++) {
        names.push(movements[i].name);
        for (var c = 0; c < movements[i].clues.length; c++) {
          allClues.push(movements[i].clues[c]);
        }
      }

      for (var m = 0; m < movements.length; m++) {
        var movement = movements[m];

        for (var q = 0; q < movement.clues.length; q++) {
          var clueSet = shuffle(movement.clues).slice(0, 3).join(", ");
          var wrongNames = getRandomWrong(names, movement.name, 4);

          result.push({
            question: clueSet + " özellikleri hangi edebi akıma aittir?",
            correct: movement.name,
            options: shuffle([movement.name].concat(wrongNames))
          });
        }

        for (var infoIndex = 0; infoIndex < movement.info.length; infoIndex++) {
          var wrongNames2 = getRandomWrong(names, movement.name, 4);
          result.push({
            question: movement.info[infoIndex] + ". Bu bilgi hangi edebi akımla ilgilidir?",
            correct: movement.name,
            options: shuffle([movement.name].concat(wrongNames2))
          });
        }

        for (var a = 0; a < movement.authors.length; a++) {
          var wrongNames3 = getRandomWrong(names, movement.name, 4);
          result.push({
            question: movement.authors[a] + " hangi edebi akımla ilişkilendirilir?",
            correct: movement.name,
            options: shuffle([movement.name].concat(wrongNames3))
          });
        }

        for (var f = 0; f < movement.clues.length; f++) {
          var correctFeature = movement.clues[f];
          var wrongFeatures = getRandomWrong(allClues, correctFeature, 4);

          result.push({
            question: movement.name + " akımı için hangisi doğrudur?",
            correct: correctFeature,
            options: shuffle([correctFeature].concat(wrongFeatures))
          });
        }
      }

      return result;
    }

    function showQuestion() {
      if (currentIndex >= currentQuestions.length) {
        finishTest();
        return;
      }

      var q = currentQuestions[currentIndex];

      document.getElementById("progressText").innerText = (currentIndex + 1) + " / " + currentQuestions.length;
      document.getElementById("questionText").innerText = q.question;

      var answers = document.getElementById("answers");
      answers.innerHTML = "";

      for (var i = 0; i < q.options.length; i++) {
        var btn = document.createElement("button");
        btn.className = "answer";
        btn.innerText = q.options[i];
        btn.onclick = makeAnswerHandler(btn, q.options[i], q);
        answers.appendChild(btn);
      }
    }

    function makeAnswerHandler(button, selected, question) {
      return function() {
        answerQuestion(button, selected, question);
      };
    }

    function answerQuestion(button, selected, q) {
      var buttons = document.getElementsByClassName("answer");

      for (var i = 0; i < buttons.length; i++) {
        buttons[i].disabled = true;
      }

      if (selected === q.correct) {
        correctCount++;
        button.classList.add("correct");
      } else {
        wrongCount++;
        button.classList.add("wrong");

        for (var b = 0; b < buttons.length; b++) {
          if (buttons[b].innerText === q.correct) {
            buttons[b].classList.add("correct");
          }
        }

        saveWrong(q.question, selected, q.correct);
      }

      setTimeout(function() {
        currentIndex++;
        showQuestion();
      }, 850);
    }

    function finishTest() {
      var total = correctCount + wrongCount;
      var percent = total === 0 ? 0 : Math.round((correctCount / total) * 100);

      document.getElementById("resultNumber").innerText = correctCount + "/" + total;
      document.getElementById("resultText").innerHTML =
        "Doğru: <b>" + correctCount + "</b> &nbsp; Yanlış: <b>" + wrongCount + "</b><br>Başarı: <b>%" + percent + "</b>";

      showScreen("resultScreen");
    }

    function showWrongs() {
      var wrongs = JSON.parse(localStorage.getItem("edebiyatWrongs") || "[]");
      var list = document.getElementById("wrongList");
      list.innerHTML = "";

      if (wrongs.length === 0) {
        list.innerHTML = '<div class="empty">Henüz yanlış yok kanka.</div>';
      } else {
        for (var i = 0; i < wrongs.length; i++) {
          var item = document.createElement("div");
          item.className = "wrong-item";
          item.innerHTML =
            "<b>Soru:</b> " + escapeHtml(wrongs[i].question) + "<br>" +
            "<b>Senin cevabın:</b> " + escapeHtml(wrongs[i].selected) + "<br>" +
            "<b>Doğru cevap:</b> " + escapeHtml(wrongs[i].correct) + "<br>" +
            "<small>" + escapeHtml(wrongs[i].date) + "</small>";
          list.appendChild(item);
        }
      }

      showScreen("wrongScreen");
    }

    function saveWrong(question, selected, correct) {
      var wrongs = JSON.parse(localStorage.getItem("edebiyatWrongs") || "[]");

      wrongs.unshift({
        question: question,
        selected: selected,
        correct: correct,
        date: new Date().toLocaleString("tr-TR")
      });

      if (wrongs.length > 200) {
        wrongs = wrongs.slice(0, 200);
      }

      localStorage.setItem("edebiyatWrongs", JSON.stringify(wrongs));
    }

    function clearWrongs() {
      localStorage.removeItem("edebiyatWrongs");
      showWrongs();
    }

    function getRandomWrong(array, correct, count) {
      var unique = [];
      var wrongs = [];

      for (var i = 0; i < array.length; i++) {
        if (array[i] !== correct && unique.indexOf(array[i]) === -1) {
          unique.push(array[i]);
        }
      }

      unique = shuffle(unique);

      for (var j = 0; j < unique.length && wrongs.length < count; j++) {
        wrongs.push(unique[j]);
      }

      return wrongs;
    }

    function shuffle(array) {
      var arr = array.slice();

      for (var i = arr.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var temp = arr[i];
        arr[i] = arr[j];
        arr[j] = temp;
      }

      return arr;
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
