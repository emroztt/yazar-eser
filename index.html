<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YKS Edebiyat Test</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at 15% 10%, rgba(255, 92, 0, 0.42), transparent 28%),
        radial-gradient(circle at 88% 18%, rgba(255, 180, 0, 0.25), transparent 24%),
        radial-gradient(circle at 75% 90%, rgba(190, 20, 20, 0.35), transparent 30%),
        linear-gradient(135deg, #130707 0%, #261013 45%, #0c0f18 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 38px 38px;
      pointer-events: none;
      opacity: 0.38;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      padding: 18px 15px 34px;
    }

    .screen {
      display: none;
      animation: fadeIn 0.24s ease;
    }

    .screen.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .brand {
      text-align: center;
      margin: 18px 0 24px;
    }

    .badge {
      display: inline-block;
      padding: 7px 13px;
      border-radius: 999px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.16);
      color: #ffc26b;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.7px;
      text-transform: uppercase;
      margin-bottom: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.22);
    }

    h1 {
      margin: 0;
      font-size: 35px;
      line-height: 1.05;
      letter-spacing: -1px;
      font-weight: 950;
    }

    .brand p {
      margin: 10px auto 0;
      max-width: 410px;
      color: rgba(255,255,255,0.72);
      font-size: 15px;
      line-height: 1.45;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .menu-card {
      position: relative;
      width: 100%;
      min-height: 116px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 26px;
      padding: 19px 18px;
      text-align: left;
      color: white;
      cursor: pointer;
      overflow: hidden;
      background: rgba(255,255,255,0.088);
      box-shadow: 0 20px 45px rgba(0,0,0,0.36);
      backdrop-filter: blur(14px);
      transition: transform 0.16s ease, background 0.16s ease, border-color 0.16s ease;
      touch-action: manipulation;
      z-index: 2;
    }

    .menu-card:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.13);
      border-color: rgba(255, 185, 70, 0.45);
    }

    .menu-card:active {
      transform: scale(0.985);
    }

    .menu-card::after {
      content: "";
      position: absolute;
      width: 115px;
      height: 115px;
      border-radius: 50%;
      right: -38px;
      top: -38px;
      background: linear-gradient(135deg, rgba(255, 61, 0, 0.88), rgba(255, 184, 28, 0.58));
      opacity: 0.82;
      pointer-events: none;
      z-index: 0;
    }

    .menu-card::before {
      content: "";
      position: absolute;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      right: 22px;
      bottom: -36px;
      background: rgba(255,255,255,0.08);
      pointer-events: none;
      z-index: 0;
    }

    .icon, .menu-card h2, .menu-card p {
      position: relative;
      z-index: 3;
      pointer-events: none;
    }

    .icon {
      width: 45px;
      height: 45px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      font-size: 23px;
      margin-bottom: 13px;
      background: linear-gradient(135deg, #ff3d00, #ffc107);
      box-shadow: 0 12px 26px rgba(255, 84, 0, 0.30);
    }

    .menu-card h2 {
      margin: 0 0 6px;
      font-size: 21px;
      letter-spacing: -0.35px;
      font-weight: 950;
    }

    .menu-card p {
      margin: 0;
      color: rgba(255,255,255,0.72);
      font-size: 14px;
      line-height: 1.42;
      padding-right: 42px;
    }

    .panel {
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 27px;
      padding: 18px;
      box-shadow: 0 20px 48px rgba(0,0,0,0.38);
      backdrop-filter: blur(14px);
    }

    .top-title {
      text-align: center;
      margin: 18px 0 15px;
      font-size: 29px;
      font-weight: 950;
      letter-spacing: -0.6px;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin: 0 0 8px 2px;
      color: rgba(255,255,255,0.80);
      font-size: 13px;
      font-weight: 850;
    }

    select {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 18px;
      padding: 15px 14px;
      outline: none;
      font-size: 16px;
      font-weight: 850;
      color: #210c06;
      background: #fff7ed;
      box-shadow: 0 12px 24px rgba(0,0,0,0.20);
    }

    .main-btn, .ghost-btn {
      width: 100%;
      border-radius: 18px;
      padding: 15px 16px;
      font-size: 16px;
      font-weight: 950;
      cursor: pointer;
      transition: transform 0.14s ease, filter 0.14s ease;
      touch-action: manipulation;
    }

    .main-btn {
      border: none;
      margin-top: 8px;
      color: #190804;
      background: linear-gradient(135deg, #ffc107, #ff3d00);
      box-shadow: 0 14px 30px rgba(255, 84, 0, 0.34);
    }

    .ghost-btn {
      margin-top: 10px;
      color: white;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.16);
    }

    .progress {
      display: inline-block;
      margin: 9px 0 14px;
      padding: 8px 13px;
      border-radius: 999px;
      background: rgba(255,255,255,0.11);
      border: 1px solid rgba(255,255,255,0.15);
      color: #ffc26b;
      font-size: 13px;
      font-weight: 850;
    }

    .question-card {
      background: rgba(255,255,255,0.98);
      color: #160907;
      border-radius: 28px;
      padding: 20px;
      box-shadow: 0 22px 52px rgba(0,0,0,0.44);
    }

    .question {
      font-size: 21px;
      line-height: 1.35;
      font-weight: 950;
      letter-spacing: -0.35px;
      margin-bottom: 17px;
    }

    .answers {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .answer {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 15px;
      text-align: left;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #262936, #11131b);
      box-shadow: 0 10px 20px rgba(0,0,0,0.18);
      touch-action: manipulation;
    }

    .answer.correct {
      background: linear-gradient(135deg, #00a884, #24db6d) !important;
      color: white !important;
    }

    .answer.wrong {
      background: linear-gradient(135deg, #ff0844, #ff3d00) !important;
      color: white !important;
    }

    .answer:disabled {
      cursor: not-allowed;
    }

    .result-number {
      text-align: center;
      font-size: 44px;
      font-weight: 950;
      margin: 8px 0 5px;
      color: #ffc107;
    }

    .result-text {
      text-align: center;
      color: rgba(255,255,255,0.78);
      margin-bottom: 16px;
      line-height: 1.45;
    }

    .wrong-item {
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 10px;
      color: rgba(255,255,255,0.88);
      font-size: 14px;
      line-height: 1.45;
    }

    .wrong-item b {
      color: #ffc26b;
    }

    .empty {
      text-align: center;
      color: rgba(255,255,255,0.72);
      padding: 28px 10px;
    }

    .mini-note {
      margin-top: 18px;
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.50);
    }

    @media (max-width: 430px) {
      .app {
        padding: 14px 13px 30px;
      }

      h1 {
        font-size: 31px;
      }

      .question {
        font-size: 19px;
      }

      .menu-card {
        border-radius: 23px;
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <div id="homeScreen" class="screen active">
      <div class="brand">
        <div class="badge">YKS Edebiyat</div>
        <h1>Edebiyat Test</h1>
        <p>Yazar-eser, roman kahramanı, edebi akım ve ÖSYM tarzı sık sorulanları hızlı tekrar et.</p>
      </div>

      <div class="menu">

        <button type="button" class="menu-card" onclick="openSettings('frequent')">
          <div class="icon">⭐</div>
          <h2>Sık Sorulanlar</h2>
          <p>ÖSYM tarzı sık gelen eserler, ilkler, akımlar ve kahramanlar.</p>
        </button>

        <button type="button" class="menu-card" onclick="openSettings('authorWork')">
          <div class="icon">✍️</div>
          <h2>Yazar - Eser</h2>
          <p>Dönem seç; yazardan eseri veya eserden yazarı bul.</p>
        </button>

        <button type="button" class="menu-card" onclick="openSettings('movements')">
          <div class="icon">🔥</div>
          <h2>Edebi Akımlar</h2>
          <p>Özellik, bilgi ve az sayıda temsilci üzerinden akımı bul.</p>
        </button>

        <button type="button" class="menu-card" onclick="openSettings('characters')">
          <div class="icon">🎭</div>
          <h2>Roman Kahramanları</h2>
          <p>Kahramanlar verilsin, hangi eserin olduğunu seç.</p>
        </button>

        <button type="button" class="menu-card" onclick="showWrongs()">
          <div class="icon">📌</div>
          <h2>Yanlışlarım</h2>
          <p>Yanlış yaptığın soruları tekrar gör.</p>
        </button>

      </div>

      <div class="mini-note">GitHub Pages üzerinde çalışır. PC kapalı olsa da link açık kalır.</div>
    </div>

    <div id="settingsScreen" class="screen">
      <h1 class="top-title" id="settingsTitle">Test Ayarları</h1>

      <div class="panel">
        <div class="field" id="periodBox">
          <label for="periodSelect">Dönem seç</label>
          <select id="periodSelect"></select>
        </div>

        <div class="field" id="typeBox">
          <label for="typeSelect">Soru tipi seç</label>
          <select id="typeSelect"></select>
        </div>

        <div class="field">
          <label for="countSelect">Kaç soru olsun?</label>
          <select id="countSelect"></select>
        </div>

        <button type="button" class="main-btn" onclick="startTest()">Teste Başla</button>
        <button type="button" class="ghost-btn" onclick="goHome()">Ana Menü</button>
      </div>
    </div>

    <div id="testScreen" class="screen">
      <div class="progress" id="progressText">1 / 10</div>

      <div class="question-card">
        <div class="question" id="questionText"></div>
        <div class="answers" id="answers"></div>
      </div>

      <button type="button" class="ghost-btn" onclick="goHome()">Testi Bitir</button>
    </div>

    <div id="resultScreen" class="screen">
      <h1 class="top-title">Sonuç</h1>
      <div class="panel">
        <div class="result-number" id="resultNumber">0/10</div>
        <div class="result-text" id="resultText"></div>
        <button type="button" class="main-btn" onclick="repeatSameTest()">Aynı Testten Tekrar Çöz</button>
        <button type="button" class="ghost-btn" onclick="goHome()">Ana Menü</button>
      </div>
    </div>

    <div id="wrongScreen" class="screen">
      <h1 class="top-title">Yanlışlarım</h1>
      <div id="wrongList"></div>
      <button type="button" class="main-btn" onclick="clearWrongs()">Yanlışları Temizle</button>
      <button type="button" class="ghost-btn" onclick="goHome()">Ana Menü</button>
    </div>

  </div>

    function buildQuestions(category, type, period, count) {
      if (category === "authorWork") {
        if (type === "authorToWork") return buildAuthorToWork(period);
        if (type === "workToAuthor") return buildWorkToAuthor(period);
      }

      if (category === "movements") return buildMovementQuestions(count);
      if (category === "characters") return buildCharacterQuestions(characters);
      if (category === "frequent") return buildFrequentQuestions(count);

      return [];
    }

    function getAuthorData(period) {
      if (period === "Tüm Dönemler") return authorWorks.slice();

      var list = [];
      for (var i = 0; i < authorWorks.length; i++) {
        if (authorWorks[i][0] === period) list.push(authorWorks[i]);
      }
      return list;
    }

    function buildAuthorToWork(period) {
      var data = getAuthorData(period);
      var allWorks = [];
      var result = [];

      for (var i = 0; i < data.length; i++) {
        for (var j = 0; j < data[i][2].length; j++) {
          allWorks.push(data[i][2][j]);
        }
      }

      for (var a = 0; a < data.length; a++) {
        for (var w = 0; w < data[a][2].length; w++) {
          var correct = data[a][2][w];
          result.push({
            question: data[a][1] + " adlı sanatçının eseri hangisidir?",
            correct: correct,
            options: shuffle([correct].concat(getRandomWrong(allWorks, correct, 4)))
          });
        }
      }

      return result;
    }

    function buildWorkToAuthor(period) {
      var data = getAuthorData(period);
      var authors = [];
      var result = [];

      for (var i = 0; i < data.length; i++) authors.push(data[i][1]);

      for (var a = 0; a < data.length; a++) {
        for (var w = 0; w < data[a][2].length; w++) {
          var work = data[a][2][w];
          var correct = data[a][1];
          result.push({
            question: '"' + work + '" adlı eser kime aittir?',
            correct: correct,
            options: shuffle([correct].concat(getRandomWrong(authors, correct, 4)))
          });
        }
      }

      return result;
    }

    function buildCharacterQuestions(source) {
      var works = [];
      var result = [];

      for (var i = 0; i < source.length; i++) works.push(source[i][0]);

      for (var c = 0; c < source.length; c++) {
        var correct = source[c][0];
        result.push({
          question: source[c][1].join(", ") + " hangi eserin kahramanlarıdır?",
          correct: correct,
          options: shuffle([correct].concat(getRandomWrong(works, correct, 4)))
        });
      }

      return result;
    }

    function buildMovementQuestions(count) {
      var base = [];
      var authorQuestions = [];
      var names = [];

      for (var i = 0; i < movements.length; i++) names.push(movements[i][0]);

      for (var m = 0; m < movements.length; m++) {
        var movement = movements[m];
        var name = movement[0];
        var clues = movement[1];
        var info = movement[2];
        var authors = movement[3];

        for (var q = 0; q < clues.length; q++) {
          var clueSet = shuffle(clues).slice(0, 3).join(", ");
          base.push({
            question: clueSet + " özellikleri hangi edebi akıma aittir?",
            correct: name,
            options: shuffle([name].concat(getRandomWrong(names, name, 4)))
          });
        }

        for (var inf = 0; inf < info.length; inf++) {
          base.push({
            question: info[inf] + ". Bu bilgi hangi edebi akımla ilgilidir?",
            correct: name,
            options: shuffle([name].concat(getRandomWrong(names, name, 4)))
          });
        }

        for (var a = 0; a < authors.length; a++) {
          authorQuestions.push({
            question: authors[a] + " hangi edebi akımla ilişkilendirilir?",
            correct: name,
            options: shuffle([name].concat(getRandomWrong(names, name, 4)))
          });
        }
      }

      base = shuffle(base);
      authorQuestions = shuffle(authorQuestions);

      var authorLimit = Math.round(count * 0.12);
      if (count <= 10) authorLimit = 1;
      if (count === 20) authorLimit = 2;
      if (count === 30) authorLimit = 3;
      if (count === 40) authorLimit = 5;
      if (count === 50) authorLimit = 6;
      if (count >= 100) authorLimit = 12;

      return base.slice(0, Math.max(0, count - authorLimit)).concat(authorQuestions.slice(0, authorLimit));
    }

    function buildFrequentQuestions(count) {
      var result = [];

      result = result.concat(buildFrequentAuthorQuestions());
      result = result.concat(buildCharacterQuestions(characters.slice(0, 18)));
      result = result.concat(buildFrequentMovementQuestions());
      result = result.concat(buildFirstQuestions());

      return shuffle(result);
    }

        ["Ahmet Yesevi", "Divan-ı Hikmet"],
        ["Dede Korkut", "Dede Korkut Hikâyeleri"],
        ["Şemsettin Sami", "Kamus-ı Türkî"],
        ["Süleyman Paşa", "Sarf-ı Türkî"],
        ["Ali Şir Nevaî", "Mecalisü’n-Nefais"],
        ["Sehî Bey", "Heşt Behişt"],
        ["Katip Çelebi", "Keşfü'z-Zunun"],
        ["Şinasi", "Durub-ı Emsal-i Osmaniye"],
        ["Şinasi", "Tercüman-ı Ahval Mukaddimesi"],
        ["Babür Şah", "Babürnâme"],
        ["Evliya Çelebi", "Seyahatname"],
        ["Recaizade Mahmud Ekrem", "Araba Sevdası"],
        ["Namık Kemal", "İntibah"],
        ["Namık Kemal", "Cezmi"],
        ["Nabizade Nazım", "Karabibik"],
        ["Nabizade Nazım", "Zehra"],
        ["Samipaşazâde Sezai", "Sergüzeşt"],
        ["Halit Ziya Uşaklıgil", "Mai ve Siyah"],
        ["Halit Ziya Uşaklıgil", "Aşk-ı Memnu"],
        ["Mehmet Rauf", "Eylül"],
        ["Yakup Kadri Karaosmanoğlu", "Yaban"],
        ["Halide Edip Adıvar", "Ateşten Gömlek"],
        ["Reşat Nuri Güntekin", "Çalıkuşu"],
        ["Peyami Safa", "Fatih-Harbiye"],
        ["Ahmet Hamdi Tanpınar", "Huzur"],
        ["Oğuz Atay", "Tutunamayanlar"],
        ["Yusuf Atılgan", "Anayurt Oteli"],
        ["Yaşar Kemal", "İnce Memed"],
        ["Orhan Kemal", "Bereketli Topraklar Üzerinde"],
        ["Fakir Baykurt", "Yılanların Öcü"]
      ];

      var authors = [];
      var works = [];
      var result = [];

      for (var i = 0; i < important.length; i++) {
        authors.push(important[i][0]);
        works.push(important[i][1]);
      }

      for (var a = 0; a < important.length; a++) {
        result.push({
          question: important[a][0] + " adlı sanatçının eseri hangisidir?",
          correct: important[a][1],
          options: shuffle([important[a][1]].concat(getRandomWrong(works, important[a][1], 4)))
        });

        result.push({
          question: '"' + important[a][1] + '" adlı eser kime aittir?',
          correct: important[a][0],
          options: shuffle([important[a][0]].concat(getRandomWrong(authors, important[a][0], 4)))
        });
      }

      return result;
    }

    function buildFrequentMovementQuestions() {
      var result = [];
      var names = [];

      for (var i = 0; i < movements.length; i++) names.push(movements[i][0]);

      for (var m = 0; m < movements.length; m++) {
        var name = movements[m][0];
        var clues = movements[m][1];
        var clueSet = shuffle(clues).slice(0, 3).join(", ");

        result.push({
          question: clueSet + " özellikleri hangi edebi akıma aittir?",
          correct: name,
          options: shuffle([name].concat(getRandomWrong(names, name, 4)))
        });
      }

      return result;
    }

    function buildFirstQuestions() {
      var result = [];
      var answers = [];

      for (var i = 0; i < firsts.length; i++) answers.push(firsts[i][1]);

      for (var f = 0; f < firsts.length; f++) {
        result.push({
          question: firsts[f][0],
          correct: firsts[f][1],
          options: shuffle([firsts[f][1]].concat(getRandomWrong(answers, firsts[f][1], 4)))
        });
      }

      return result;
    }

    function showQuestion() {
      if (currentIndex >= currentQuestions.length) {
        finishTest();
        return;
      }

      var q = currentQuestions[currentIndex];

      document.getElementById("progressText").innerText = (currentIndex + 1) + " / " + currentQuestions.length;
      document.getElementById("questionText").innerText = q.question;

      var answers = document.getElementById("answers");
      answers.innerHTML = "";

      for (var i = 0; i < q.options.length; i++) {
        var btn = document.createElement("button");
        btn.type = "button";
        btn.className = "answer";
        btn.innerText = q.options[i];
        btn.onclick = makeAnswerHandler(btn, q.options[i], q);
        answers.appendChild(btn);
      }
    }

    function makeAnswerHandler(button, selected, question) {
      return function() {
        answerQuestion(button, selected, question);
      };
    }

    function answerQuestion(button, selected, q) {
      var buttons = document.getElementsByClassName("answer");

      for (var i = 0; i < buttons.length; i++) buttons[i].disabled = true;

      if (selected === q.correct) {
        correctCount++;
        button.classList.add("correct");
      } else {
        wrongCount++;
        button.classList.add("wrong");

        for (var b = 0; b < buttons.length; b++) {
          if (buttons[b].innerText === q.correct) buttons[b].classList.add("correct");
        }

        saveWrong(q.question, selected, q.correct);
      }

      setTimeout(function() {
        currentIndex++;
        showQuestion();
      }, 850);
    }

    function finishTest() {
      var total = correctCount + wrongCount;
      var percent = total === 0 ? 0 : Math.round((correctCount / total) * 100);

      document.getElementById("resultNumber").innerText = correctCount + "/" + total;
      document.getElementById("resultText").innerHTML =
        "Doğru: <b>" + correctCount + "</b> &nbsp; Yanlış: <b>" + wrongCount + "</b><br>Başarı: <b>%" + percent + "</b>";

      showScreen("resultScreen");
    }

    function showWrongs() {
      var wrongs = JSON.parse(localStorage.getItem("edebiyatWrongs") || "[]");
      var list = document.getElementById("wrongList");
      list.innerHTML = "";

      if (wrongs.length === 0) {
        list.innerHTML = '<div class="empty">Henüz yanlış yok kanka.</div>';
      } else {
        for (var i = 0; i < wrongs.length; i++) {
          var item = document.createElement("div");
          item.className = "wrong-item";
          item.innerHTML =
            "<b>Soru:</b> " + escapeHtml(wrongs[i].question) + "<br>" +
            "<b>Senin cevabın:</b> " + escapeHtml(wrongs[i].selected) + "<br>" +
            "<b>Doğru cevap:</b> " + escapeHtml(wrongs[i].correct) + "<br>" +
            "<small>" + escapeHtml(wrongs[i].date) + "</small>";
          list.appendChild(item);
        }
      }

      showScreen("wrongScreen");
    }

    function saveWrong(question, selected, correct) {
      var wrongs = JSON.parse(localStorage.getItem("edebiyatWrongs") || "[]");

      wrongs.unshift({
        question: question,
        selected: selected,
        correct: correct,
        date: new Date().toLocaleString("tr-TR")
      });

      if (wrongs.length > 250) wrongs = wrongs.slice(0, 250);

      localStorage.setItem("edebiyatWrongs", JSON.stringify(wrongs));
    }

    function clearWrongs() {
      localStorage.removeItem("edebiyatWrongs");
      showWrongs();
    }

    function getRandomWrong(array, correct, count) {
      var unique = [];
      var wrongs = [];

      for (var i = 0; i < array.length; i++) {
        if (array[i] !== correct && unique.indexOf(array[i]) === -1) unique.push(array[i]);
      }

      unique = shuffle(unique);

      for (var j = 0; j < unique.length && wrongs.length < count; j++) {
        wrongs.push(unique[j]);
      }

      return wrongs;
    }

    function shuffle(array) {
      var arr = array.slice();

      for (var i = arr.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var temp = arr[i];
        arr[i] = arr[j];
        arr[j] = temp;
      }

      return arr;
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
