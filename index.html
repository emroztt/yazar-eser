<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YKS Edebiyat Test</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      background:
        radial-gradient(circle at top left, rgba(255, 100, 0, 0.45), transparent 30%),
        radial-gradient(circle at bottom right, rgba(255, 0, 70, 0.35), transparent 30%),
        linear-gradient(135deg, #140707, #271016, #080b12);
    }

    .app {
      max-width: 560px;
      margin: 0 auto;
      padding: 18px 15px 35px;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .brand {
      text-align: center;
      margin: 18px 0 24px;
    }

    .badge {
      display: inline-block;
      padding: 7px 13px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      color: #ffc46b;
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: 34px;
    }

    .brand p {
      color: rgba(255,255,255,0.75);
      font-size: 15px;
      line-height: 1.45;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .menu-card {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 24px;
      padding: 20px;
      text-align: left;
      color: white;
      background: rgba(255,255,255,0.10);
      box-shadow: 0 18px 40px rgba(0,0,0,0.35);
      cursor: pointer;
      touch-action: manipulation;
    }

    .menu-card:active {
      transform: scale(0.98);
    }

    .icon {
      width: 45px;
      height: 45px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      font-size: 23px;
      background: linear-gradient(135deg, #ff3d00, #ffc107);
      margin-bottom: 12px;
    }

    .menu-card h2 {
      margin: 0 0 6px;
      font-size: 21px;
    }

    .menu-card p {
      margin: 0;
      color: rgba(255,255,255,0.72);
      font-size: 14px;
    }

    .panel {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 24px;
      padding: 18px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.35);
    }

    .top-title {
      text-align: center;
      margin: 18px 0 15px;
      font-size: 28px;
    }

    label {
      display: block;
      margin: 12px 0 8px;
      font-size: 14px;
      font-weight: bold;
      color: rgba(255,255,255,0.8);
    }

    select {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 15px;
      font-size: 16px;
      font-weight: bold;
      background: #fff7ed;
      color: #21100a;
    }

    .main-btn, .ghost-btn {
      width: 100%;
      border-radius: 16px;
      padding: 15px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      touch-action: manipulation;
    }

    .main-btn {
      margin-top: 16px;
      border: none;
      color: #190804;
      background: linear-gradient(135deg, #ffc107, #ff3d00);
    }

    .ghost-btn {
      margin-top: 10px;
      color: white;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
    }

    .progress {
      display: inline-block;
      margin: 8px 0 14px;
      padding: 8px 13px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      color: #ffc46b;
      font-weight: bold;
      font-size: 13px;
    }

    .question-card {
      background: white;
      color: #160907;
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 22px 50px rgba(0,0,0,0.45);
    }

    .question {
      font-size: 21px;
      font-weight: bold;
      line-height: 1.35;
      margin-bottom: 16px;
    }

    .answers {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .answer {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 15px;
      text-align: left;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #262936, #11131b);
    }

    .answer.correct {
      background: #19b86a !important;
    }

    .answer.wrong {
      background: #e53935 !important;
    }

    .wrong-item {
      background: rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 10px;
      line-height: 1.45;
      font-size: 14px;
    }

    .wrong-item b {
      color: #ffc46b;
    }
  </style>
</head>

<body>
  <div class="app">

    <div id="homeScreen" class="screen active">
      <div class="brand">
        <div class="badge">YKS Edebiyat</div>
        <h1>Edebiyat Test</h1>
        <p>ÖSYM tarzı sık sorulanlar, yazar-eser, edebi akımlar ve roman kahramanları.</p>
      </div>

      <div class="menu">
        <button class="menu-card" id="btnFrequent">
          <div class="icon">⭐</div>
          <h2>Sık Sorulanlar</h2>
          <p>İlkler, temel eserler, akımlar ve kahramanlar.</p>
        </button>

        <button class="menu-card" id="btnAuthor">
          <div class="icon">✍️</div>
          <h2>Yazar - Eser</h2>
          <p>Dönem seç, yazar-eser ya da eser-yazar çöz.</p>
        </button>

        <button class="menu-card" id="btnMovements">
          <div class="icon">🔥</div>
          <h2>Edebi Akımlar</h2>
          <p>Özelliklerden edebi akımı bul.</p>
        </button>

        <button class="menu-card" id="btnCharacters">
          <div class="icon">🎭</div>
          <h2>Roman Kahramanları</h2>
          <p>Kahramanlardan eseri bul.</p>
        </button>

        <button class="menu-card" id="btnWrongs">
          <div class="icon">📌</div>
          <h2>Yanlışlarım</h2>
          <p>Yanlışlarını tekrar gör.</p>
        </button>
      </div>
    </div>

    <div id="settingsScreen" class="screen">
      <h1 class="top-title" id="settingsTitle">Test Ayarları</h1>

      <div class="panel">
        <div id="periodBox">
          <label>Dönem seç</label>
          <select id="periodSelect"></select>
        </div>

        <div id="typeBox">
          <label>Soru tipi seç</label>
          <select id="typeSelect"></select>
        </div>

        <label>Kaç soru olsun?</label>
        <select id="countSelect"></select>

        <button class="main-btn" id="startBtn">Teste Başla</button>
        <button class="ghost-btn" id="homeBtn1">Ana Menü</button>
      </div>
    </div>

    <div id="testScreen" class="screen">
      <div class="progress" id="progressText"></div>

      <div class="question-card">
        <div class="question" id="questionText"></div>
        <div class="answers" id="answers"></div>
      </div>

      <button class="ghost-btn" id="homeBtn2">Testi Bitir</button>
    </div>

    <div id="resultScreen" class="screen">
      <h1 class="top-title">Sonuç</h1>

      <div class="panel">
        <h1 id="resultNumber" style="text-align:center;color:#ffc107;"></h1>
        <p id="resultText" style="text-align:center;"></p>

        <button class="main-btn" id="repeatBtn">Aynı Testi Tekrar Çöz</button>
        <button class="ghost-btn" id="homeBtn3">Ana Menü</button>
      </div>
    </div>

    <div id="wrongScreen" class="screen">
      <h1 class="top-title">Yanlışlarım</h1>
      <div id="wrongList"></div>
      <button class="main-btn" id="clearWrongBtn">Yanlışları Temizle</button>
      <button class="ghost-btn" id="homeBtn4">Ana Menü</button>
    </div>

  </div>

  <script>

      ["Servetifünun", "Mehmet Rauf", ["Eylül", "Siyah İnciler"]],
      ["Servetifünun", "Tevfik Fikret", ["Sis", "Şermin", "Rübab-ı Şikeste"]],

      ["Milli Edebiyat", "Ömer Seyfettin", ["Diyet", "Bomba", "Yüksek Ökçeler", "Efruz Bey"]],

      ["Milli Edebiyat", "Halide Edip Adıvar", ["Ateşten Gömlek", "Vurun Kahpeye"]],
      ["Milli Edebiyat", "Reşat Nuri Güntekin", ["Çalıkuşu", "Yaprak Dökümü", "Yeşil Gece"]],

      ["Cumhuriyet", "Ahmet Hamdi Tanpınar", ["Huzur", "Saatleri Ayarlama Enstitüsü", "Beş Şehir"]],
      ["Cumhuriyet", "Peyami Safa", ["Fatih-Harbiye", "Dokuzuncu Hariciye Koğuşu"]],
      ["Cumhuriyet", "Oğuz Atay", ["Tutunamayanlar", "Tehlikeli Oyunlar"]],
      ["Cumhuriyet", "Yusuf Atılgan", ["Anayurt Oteli", "Aylak Adam"]],

      ["Cumhuriyet", "Fakir Baykurt", ["Yılanların Öcü", "Irazca’nın Dirliği"]]
    ];

    var characters = [
      ["Araba Sevdası", ["Bihruz Bey", "Periveş", "Keşfi Bey"]],
      ["İntibah", ["Ali Bey", "Mahpeyker", "Dilaşup"]],
      ["Aşk-ı Memnu", ["Adnan Bey", "Bihter", "Behlül", "Nihal"]],
      ["Eylül", ["Necip", "Suat", "Süreyya"]],
      ["Mai ve Siyah", ["Ahmet Cemil", "Lamia", "Hüseyin Nazmi"]],
      ["Yaprak Dökümü", ["Ali Rıza Bey", "Ferhunde", "Leyla", "Necla"]],
      ["Çalıkuşu", ["Feride", "Kamuran"]],
      ["Yaban", ["Ahmet Celal", "Emine", "Mehmet Ali"]],
      ["Huzur", ["Mümtaz", "Nuran", "Suat", "İhsan"]],
      ["Anayurt Oteli", ["Zebercet"]],
      ["Tutunamayanlar", ["Selim Işık", "Turgut Özben"]],
      ["İnce Memed", ["Memed", "Hatce", "Abdi Ağa"]],
      ["Kuyucaklı Yusuf", ["Yusuf", "Muazzez"]],
      ["Fatih-Harbiye", ["Neriman", "Şinasi", "Macit"]]
    ];

    var movements = [
      ["Klasisizm", ["Akıl ve sağduyu", "Kuralcılık", "Eski Yunan ve Latin etkisi"], ["Moliere"]],
      ["Romantizm", ["Duygu ve hayal", "Hürriyet", "Tarihî konular", "Sanatçı kişiliğini gizlemez"], ["Victor Hugo", "Namık Kemal"]],
      ["Realizm", ["Gözlem", "Nesnellik", "Çevre tasviri", "Neden-sonuç"], ["Balzac", "Flaubert"]],
      ["Natüralizm", ["Soyaçekim", "Determinizm", "Toplum laboratuvarı", "Sokak dili"], ["Emile Zola"]],
      ["Parnasizm", ["Biçim kusursuzluğu", "Sanat sanat içindir", "Kuyumcu titizliği"], ["Tevfik Fikret", "Cenap Şahabettin"]],
      ["Sembolizm", ["Musiki", "Kapalılık", "Sezdirme", "Alacakaranlık"], ["Ahmet Haşim", "Verlaine"]],
      ["Fütürizm", ["Hız", "Makineleşme", "Gelecekçilik", "Dinamizm"], ["Marinetti", "Nazım Hikmet"]],
      ["Dadaizm", ["Kuralsızlık", "Anlamsızlık", "Geleneksel sanatı reddetme"], ["Tristan Tzara"]],
      ["Sürrealizm", ["Bilinçaltı", "Rüya", "Freud", "Otomatik yazı"], ["Andre Breton"]],
      ["Egzistansiyalizm", ["Varoluş", "Bunaltı", "Yabancılaşma", "Sorumluluk"], ["Sartre", "Camus"]]
    ];

    var firsts = [
      ["Türk dilinin ilk sözlüğü hangisidir?", "Divanü Lügati't-Türk"],
      ["İlk siyasetname örneği hangisidir?", "Kutadgu Bilig"],
      ["İlk yazılı edebî metin hangisidir?", "Göktürk Yazıtları"],
      ["İlk Türkçe sözlük hangisidir?", "Kamus-ı Türkî"],
      ["Türkçenin ilk dil bilgisi kitabı hangisidir?", "Sarf-ı Türkî"],
      ["İlk tezkire örneği hangisidir?", "Mecalisü’n-Nefais"],
      ["Anadolu sahasında yazılan ilk tezkire hangisidir?", "Heşt Behişt"],
      ["İlk bibliyografya örneği hangisidir?", "Keşfü'z-Zunun"],
      ["İlk atasözleri derlemesi hangisidir?", "Durub-ı Emsal-i Osmaniye"],
      ["İlk hatıra kitabı hangisidir?", "Babürnâme"],
      ["En önemli gezi yazısı örneği hangisidir?", "Seyahatname"],
      ["İlk yerli roman hangisidir?", "Taaşşuk-ı Talat ve Fitnat"],
      ["İlk edebî roman hangisidir?", "İntibah"],
      ["İlk realist roman denemesi hangisidir?", "Araba Sevdası"],
      ["İlk köy romanı denemesi hangisidir?", "Karabibik"],
      ["İlk psikolojik roman hangisidir?", "Eylül"],
      ["İlk tiyatro eseri hangisidir?", "Şair Evlenmesi"]
    ];

    var currentCategory = "";
    var currentType = "";
    var currentPeriod = "Tüm Dönemler";
    var currentCount = 10;
    var questions = [];
    var index = 0;
    var correct = 0;
    var wrong = 0;
    var lastSettings = null;

    document.getElementById("btnFrequent").addEventListener("click", function(){ openSettings("frequent"); });
    document.getElementById("btnAuthor").addEventListener("click", function(){ openSettings("authorWork"); });
    document.getElementById("btnMovements").addEventListener("click", function(){ openSettings("movements"); });
    document.getElementById("btnCharacters").addEventListener("click", function(){ openSettings("characters"); });
    document.getElementById("btnWrongs").addEventListener("click", showWrongs);
    document.getElementById("startBtn").addEventListener("click", startTest);
    document.getElementById("homeBtn1").addEventListener("click", goHome);
    document.getElementById("homeBtn2").addEventListener("click", goHome);
    document.getElementById("homeBtn3").addEventListener("click", goHome);
    document.getElementById("homeBtn4").addEventListener("click", goHome);
    document.getElementById("repeatBtn").addEventListener("click", repeatSameTest);
    document.getElementById("clearWrongBtn").addEventListener("click", clearWrongs);

    function showScreen(id) {
      var screens = document.getElementsByClassName("screen");
      for (var i = 0; i < screens.length; i++) {
        screens[i].classList.remove("active");
      }
      document.getElementById(id).classList.add("active");
      window.scrollTo(0, 0);
    }

    function goHome() {
      showScreen("homeScreen");
    }

    function openSettings(category) {
      currentCategory = category;

      var title = document.getElementById("settingsTitle");
      var periodBox = document.getElementById("periodBox");
      var typeBox = document.getElementById("typeBox");
      var periodSelect = document.getElementById("periodSelect");
      var typeSelect = document.getElementById("typeSelect");
      var countSelect = document.getElementById("countSelect");

      periodSelect.innerHTML = "";
      typeSelect.innerHTML = "";
      countSelect.innerHTML = "";

      for (var i = 10; i <= 100; i += 10) {
        addOption(countSelect, String(i), i + " soru");
      }

      if (category === "authorWork") {
        title.innerText = "Yazar - Eser";
        periodBox.style.display = "block";
        typeBox.style.display = "block";

        var periods = ["Tüm Dönemler", "İslamiyet İlk Dönem", "Tanzimat", "Servetifünun", "Fecriati", "Milli Edebiyat", "Cumhuriyet"];
        for (var p = 0; p < periods.length; p++) {
          addOption(periodSelect, periods[p], periods[p]);
        }

        addOption(typeSelect, "authorToWork", "Yazar - Eser");
        addOption(typeSelect, "workToAuthor", "Eser - Yazar");
      } else {
        periodBox.style.display = "none";
        typeBox.style.display = "none";

        if (category === "frequent") title.innerText = "Sık Sorulanlar";
        if (category === "movements") title.innerText = "Edebi Akımlar";
        if (category === "characters") title.innerText = "Roman Kahramanları";
      }

      showScreen("settingsScreen");
    }

    function addOption(select, value, text) {
      var opt = document.createElement("option");
      opt.value = value;
      opt.text = text;
      select.appendChild(opt);
    }

    function startTest() {
      currentCount = Number(document.getElementById("countSelect").value);

      if (currentCategory === "authorWork") {
        currentPeriod = document.getElementById("periodSelect").value;
        currentType = document.getElementById("typeSelect").value;
      } else {
        currentPeriod = "Tüm Dönemler";
        currentType = currentCategory;
      }

      lastSettings = [currentCategory, currentType, currentPeriod, currentCount];

      questions = buildQuestions();
      questions = shuffle(questions);

      if (questions.length > currentCount) {
        questions = questions.slice(0, currentCount);
      }

      index = 0;
      correct = 0;
      wrong = 0;

      showScreen("testScreen");
      showQuestion();
    }

    function repeatSameTest() {
      if (!lastSettings) {
        goHome();
        return;
      }

      currentCategory = lastSettings[0];
      currentType = lastSettings[1];
      currentPeriod = lastSettings[2];
      currentCount = lastSettings[3];

      questions = buildQuestions();
      questions = shuffle(questions);

      if (questions.length > currentCount) {
        questions = questions.slice(0, currentCount);
      }

      index = 0;
      correct = 0;
      wrong = 0;

      showScreen("testScreen");
      showQuestion();
    }

    function buildQuestions() {
      if (currentCategory === "authorWork") {
        if (currentType === "authorToWork") return buildAuthorToWork();
        return buildWorkToAuthor();
      }

      if (currentCategory === "characters") return buildCharacterQuestions(characters);
      if (currentCategory === "movements") return buildMovementQuestions();
      if (currentCategory === "frequent") return buildFrequentQuestions();

      return [];
    }

    function getAuthorData() {
      if (currentPeriod === "Tüm Dönemler") {
        return authorWorks.slice();
      }

      var list = [];
      for (var i = 0; i < authorWorks.length; i++) {
        if (authorWorks[i][0] === currentPeriod) list.push(authorWorks[i]);
      }
      return list;
    }

    function buildAuthorToWork() {
      var data = getAuthorData();
      var allWorks = [];
      var result = [];

      for (var i = 0; i < data.length; i++) {
        for (var j = 0; j < data[i][2].length; j++) {
          allWorks.push(data[i][2][j]);
        }
      }

      for (var a = 0; a < data.length; a++) {
        var author = data[a][1];
        var worksOfAuthor = data[a][2];

        for (var w = 0; w < worksOfAuthor.length; w++) {
          var trueWork = worksOfAuthor[w];
          var wrongPool = [];

          for (var x = 0; x < allWorks.length; x++) {
            if (worksOfAuthor.indexOf(allWorks[x]) === -1) {
              wrongPool.push(allWorks[x]);
            }
          }

          result.push({
            question: author + " adlı sanatçının eseri hangisidir?",
            answer: trueWork,
            options: shuffle([trueWork].concat(getRandomWrong(wrongPool, trueWork, 4)))
          });
        }
      }

      return result;
    }

    function buildWorkToAuthor() {
      var data = getAuthorData();
      var authors = [];
      var ownerMap = {};
      var result = [];

      for (var i = 0; i < data.length; i++) {
        authors.push(data[i][1]);

        for (var j = 0; j < data[i][2].length; j++) {
          var work = data[i][2][j];

          if (!ownerMap[work]) ownerMap[work] = [];
          if (ownerMap[work].indexOf(data[i][1]) === -1) ownerMap[work].push(data[i][1]);
        }
      }

      for (var a = 0; a < data.length; a++) {
        var author = data[a][1];

        for (var w = 0; w < data[a][2].length; w++) {
          var workName = data[a][2][w];

          if (ownerMap[workName] && ownerMap[workName].length > 1) continue;

          result.push({
            question: '"' + workName + '" adlı eser kime aittir?",
            answer: author,
            options: shuffle([author].concat(getRandomWrong(authors, author, 4)))
          });
        }
      }

      return result;
    }

    function buildCharacterQuestions(source) {
      var works = [];
      var result = [];

      for (var i = 0; i < source.length; i++) works.push(source[i][0]);

      for (var c = 0; c < source.length; c++) {
        result.push({
          question: source[c][1].join(", ") + " hangi eserin kahramanlarıdır?",
          answer: source[c][0],
          options: shuffle([source[c][0]].concat(getRandomWrong(works, source[c][0], 4)))
        });
      }

      return result;
    }

    function buildMovementQuestions() {
      var names = [];
      var base = [];
      var authorQs = [];

      for (var i = 0; i < movements.length; i++) names.push(movements[i][0]);

      for (var m = 0; m < movements.length; m++) {
        var name = movements[m][0];
        var clues = movements[m][1];
        var authors = movements[m][2];

        for (var c = 0; c < clues.length; c++) {
          var clue = shuffle(clues).slice(0, 3).join(", ");
          base.push({
            question: clue + " özellikleri hangi edebi akıma aittir?",
            answer: name,
            options: shuffle([name].concat(getRandomWrong(names, name, 4)))
          });
        }

        for (var a = 0; a < authors.length; a++) {
          authorQs.push({
            question: authors[a] + " hangi edebi akımla ilişkilendirilir?",
            answer: name,
            options: shuffle([name].concat(getRandomWrong(names, name, 4)))
          });
        }
      }

      var authorLimit = 1;
      if (currentCount >= 20) authorLimit = 2;
      if (currentCount >= 30) authorLimit = 3;
      if (currentCount >= 50) authorLimit = 6;
      if (currentCount >= 100) authorLimit = 12;

      return shuffle(base).slice(0, currentCount - authorLimit).concat(shuffle(authorQs).slice(0, authorLimit));
    }

    function buildFrequentQuestions() {
      var result = [];
      result = result.concat(buildAuthorToWork());
      result = result.concat(buildWorkToAuthor());
      result = result.concat(buildCharacterQuestions(characters));
      result = result.concat(buildMovementQuestions());
      result = result.concat(buildFirstQuestions());
      return shuffle(result);
    }

    function buildFirstQuestions() {
      var result = [];
      var answers = [];

      for (var i = 0; i < firsts.length; i++) answers.push(firsts[i][1]);

      for (var f = 0; f < firsts.length; f++) {
        result.push({
          question: firsts[f][0],
          answer: firsts[f][1],
          options: shuffle([firsts[f][1]].concat(getRandomWrong(answers, firsts[f][1], 4)))
        });
      }

      return result;
    }

    function showQuestion() {
      if (index >= questions.length) {
        finishTest();
        return;
      }

      var q = questions[index];

      document.getElementById("progressText").innerText = (index + 1) + " / " + questions.length;
      document.getElementById("questionText").innerText = q.question;

      var answers = document.getElementById("answers");
      answers.innerHTML = "";

      for (var i = 0; i < q.options.length; i++) {
        var btn = document.createElement("button");
        btn.className = "answer";
        btn.innerText = q.options[i];

        btn.addEventListener("click", makeAnswerHandler(btn, q.options[i], q));

        answers.appendChild(btn);
      }
    }

    function makeAnswerHandler(btn, selected, q) {
      return function() {
        answerQuestion(btn, selected, q);
      };
    }

    function answerQuestion(btn, selected, q) {
      var buttons = document.getElementsByClassName("answer");

      for (var i = 0; i < buttons.length; i++) {
        buttons[i].disabled = true;
      }

      if (selected === q.answer) {
        correct++;
        btn.classList.add("correct");
      } else {
        wrong++;
        btn.classList.add("wrong");

        for (var b = 0; b < buttons.length; b++) {
          if (buttons[b].innerText === q.answer) buttons[b].classList.add("correct");
        }

        saveWrong(q.question, selected, q.answer);
      }

      setTimeout(function() {
        index++;
        showQuestion();
      }, 850);
    }

    function finishTest() {
      var total = correct + wrong;
      var percent = total === 0 ? 0 : Math.round((correct / total) * 100);

      document.getElementById("resultNumber").innerText = correct + "/" + total;
      document.getElementById("resultText").innerHTML =
        "Doğru: <b>" + correct + "</b> &nbsp; Yanlış: <b>" + wrong + "</b><br>Başarı: <b>%" + percent + "</b>";

      showScreen("resultScreen");
    }

    function showWrongs() {
      var wrongs = JSON.parse(localStorage.getItem("edebiyatWrongs") || "[]");
      var list = document.getElementById("wrongList");
      list.innerHTML = "";

      if (wrongs.length === 0) {
        list.innerHTML = "<p style='text-align:center;'>Henüz yanlış yok kanka.</p>";
      } else {
        for (var i = 0; i < wrongs.length; i++) {
          var div = document.createElement("div");
          div.className = "wrong-item";
          div.innerHTML =
            "<b>Soru:</b> " + escapeHtml(wrongs[i].question) + "<br>" +
            "<b>Senin cevabın:</b> " + escapeHtml(wrongs[i].selected) + "<br>" +
            "<b>Doğru cevap:</b> " + escapeHtml(wrongs[i].answer) + "<br>" +
            "<small>" + escapeHtml(wrongs[i].date) + "</small>";
          list.appendChild(div);
        }
      }

      showScreen("wrongScreen");
    }

    function saveWrong(question, selected, answer) {
      var wrongs = JSON.parse(localStorage.getItem("edebiyatWrongs") || "[]");

      wrongs.unshift({
        question: question,
        selected: selected,
        answer: answer,
        date: new Date().toLocaleString("tr-TR")
      });

      if (wrongs.length > 250) wrongs = wrongs.slice(0, 250);

      localStorage.setItem("edebiyatWrongs", JSON.stringify(wrongs));
    }

    function clearWrongs() {
      localStorage.removeItem("edebiyatWrongs");
      showWrongs();
    }

    function getRandomWrong(array, correct, count) {
      var unique = [];
      var wrongs = [];

      for (var i = 0; i < array.length; i++) {
        if (array[i] !== correct && unique.indexOf(array[i]) === -1) unique.push(array[i]);
      }

      unique = shuffle(unique);

      for (var j = 0; j < unique.length && wrongs.length < count; j++) {
        wrongs.push(unique[j]);
      }

      return wrongs;
    }

    function shuffle(array) {
      var arr = array.slice();

      for (var i = arr.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = arr[i];
        arr[i] = arr[j];
        arr[j] = tmp;
      }

      return arr;
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
